<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TAWHID FC | PRO HUB</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #6b21a8; --bg: #ffffff; --card: #f8f9fa; --text: #1a1a1a; --accent: #fbbf24; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Cairo', sans-serif; padding-bottom: 90px; }
        .section { display: none; padding: 15px; } .active { display: block; }
        .card { background: var(--card); border-radius: 20px; padding: 15px; margin-bottom: 15px; border: 1px solid #eee; }
        #login-overlay { position: fixed; inset: 0; background: var(--primary); z-index: 100000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .pin-input { background: white; border: none; border-radius: 15px; padding: 15px; width: 220px; text-align: center; font-size: 24px; color: var(--primary); outline: none; margin-bottom: 20px;}
        nav { position: fixed; bottom: 15px; left: 15px; right: 15px; background: white; border-radius: 25px; display: flex; justify-content: space-around; padding: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); z-index: 999; }
        nav button { background: none; border: none; color: #ccc; font-size: 22px; cursor: pointer; }
        nav button.active { color: var(--primary); }
        .btn-action { background: var(--primary); color: white; border: none; width: 100%; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        input, select, textarea { width: 100%; padding: 10px; margin-top: 8px; border-radius: 10px; border: 1px solid #ddd; font-family: 'Cairo'; }
        .top-bar { background: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 1000; }
        .player-img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; }
        .stats-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 10px; }
        .stats-table th { background: var(--primary); color: white; padding: 5px; }
        .stats-table td { padding: 5px; text-align: center; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

    <!-- شاشة الدخول -->
    <div id="login-overlay">
        <h2>TAWHID FC</h2>
        <input type="password" id="pin-input" class="pin-input" maxlength="2" placeholder="••">
        <button onclick="handleLogin()" style="padding:10px 40px; border-radius:20px; border:none; background:white; color:var(--primary); font-weight:bold;">دخول</button>
    </div>

    <div class="top-bar">
        <i class="fas fa-chevron-right" id="back-icon" style="visibility:hidden; color:var(--primary)" onclick="showSec('news')"></i>
        <strong style="color:var(--primary)">TAWHID FC</strong>
        <i id="admin-icon" class="fas fa-cog" style="display:none; color:var(--primary); font-size:20px;" onclick="showSec('admin')"></i>
    </div>

    <div class="container">
        <!-- قسم الأخبار -->
        <section id="news-sec" class="section active"><h3>أخبار النادي</h3><div id="news-list"></div></section>

        <!-- قسم اللاعبين -->
        <section id="squad-sec" class="section"><h3>اللاعبين</h3><div id="squad-list"></div></section>

        <!-- بروفايل اللاعب -->
        <section id="player-profile-sec" class="section">
            <div id="player-header" style="text-align:center;"></div>
            <div class="card"><table class="stats-table"><thead><tr><th>الشهر</th><th>M</th><th>G</th><th>A</th><th>MOTM</th><th>PASS%</th><th>SHOT%</th><th>RATE</th></tr></thead><tbody id="stats-body"></tbody></table></div>
        </section>

        <!-- قسم الجوائز -->
        <section id="awards-sec" class="section"><h3>الجوائز</h3><div id="awards-list"></div></section>

        <!-- لوحة التحكم -->
        <section id="admin-sec" class="section">
            <h3>لوحة التحكم (07)</h3>
            
            <div class="card">
                <h4>1. إضافة لاعب</h4>
                <input type="text" id="adm-p-name" placeholder="الاسم الكامل">
                <input type="text" id="adm-p-user" placeholder="يوزر اللاعب">
                <input type="number" id="adm-p-num" placeholder="الرقم">
                <select id="adm-p-pos"><option value="1">حارس</option><option value="2">دفاع</option><option value="3">وسط</option><option value="4">هجوم</option></select>
                <input type="file" id="adm-p-img" accept="image/*">
                <button class="btn-action" onclick="adminAddPlayer()">حفظ اللاعب</button>
            </div>

            <div class="card">
                <h4>2. إضافة خبر</h4>
                <input type="text" id="adm-n-title" placeholder="عنوان الخبر">
                <textarea id="adm-n-desc" placeholder="التفاصيل"></textarea>
                <input type="file" id="adm-n-img" accept="image/*">
                <button class="btn-action" onclick="adminAddNews()">نشر الخبر</button>
            </div>

            <div class="card">
                <h4>3. تحديث إحصائيات</h4>
                <select id="adm-stat-player"></select>
                <select id="adm-stat-month">
                    <option value="10-2025">10-2025</option><option value="11-2025">11-2025</option><option value="12-2025">12-2025</option>
                    <option value="01-2026">01-2026</option><option value="02-2026">02-2026</option><option value="03-2026">03-2026</option>
                </select>
                <input type="number" id="adm-stat-m" placeholder="مباريات">
                <input type="number" id="adm-stat-g" placeholder="أهداف">
                <input type="number" id="adm-stat-a" placeholder="أسيست">
                <input type="number" id="adm-stat-pass" placeholder="دقة تمرير %">
                <input type="number" id="adm-stat-shot" placeholder="دقة تسديد %">
                <input type="number" step="0.1" id="adm-stat-rate" placeholder="التقييم">
                <button class="btn-action" onclick="adminUpdateStats()">تحديث الإحصائيات</button>
            </div>

            <div class="card">
                <h4>4. الجوائز</h4>
                <input type="text" id="adm-potm-name" placeholder="اسم لاعب الشهر">
                <input type="file" id="adm-potm-img" accept="image/*">
                <input type="file" id="adm-goal-vid" accept="video/*">
                <button class="btn-action" onclick="adminUpdateAwards()">تحديث الجوائز</button>
            </div>
        </section>
    </div>

    <nav>
        <button onclick="showSec('news')" id="btn-news" class="active"><i class="fas fa-home"></i></button>
        <button onclick="showSec('squad')" id="btn-squad"><i class="fas fa-users"></i></button>
        <button onclick="showSec('awards')" id="btn-awards"><i class="fas fa-award"></i></button>
    </nav>

    <script>
        const SB_URL = "https://pgpjdwltezrxmpnuqvem.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBncGpkd2x0ZXpyeG1wbnVxdmVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4MzUwMjgsImV4cCI6MjA5MjQxMTAyOH0.KtVZAP-EhFAw1gonKGn4ulXVJp-tjKZVFIMNEfES7ho";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let userPin = "";

        async function handleLogin() {
            const pin = document.getElementById('pin-input').value;
            if(["07", "78", "28", "29", "08", "02"].includes(pin)) {
                userPin = pin;
                document.getElementById('login-overlay').style.display = 'none';
                if(pin === "07") document.getElementById('admin-icon').style.display = 'block';
                loadData();
            } else alert("خطأ!");
        }

        function showSec(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id + '-sec').classList.add('active');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            if(document.getElementById('btn-'+id)) document.getElementById('btn-'+id).classList.add('active');
            document.getElementById('back-icon').style.visibility = (id === 'news' ? 'hidden' : 'visible');
        }

        async function loadData() {
            // تحميل الأخبار
            const { data: news } = await _supabase.from('news').select('*').order('id', {ascending: false});
            const newsList = document.getElementById('news-list');
            newsList.innerHTML = "";
            news?.forEach(n => {
                newsList.innerHTML += `<div class="card"><h4>${n.title}</h4><img src="${n.img}" style="width:100%; border-radius:10px;"><p>${n.desc}</p></div>`;
            });

            // تحميل اللاعبين
            const { data: players } = await _supabase.from('players').select('*').order('pos');
            const squadList = document.getElementById('squad-list');
            const admSel = document.getElementById('adm-stat-player');
            squadList.innerHTML = ""; admSel.innerHTML = "";
            players?.forEach(p => {
                admSel.innerHTML += `<option value="${p.id}">${p.user}</option>`;
                squadList.innerHTML += `<div class="card" style="display:flex; align-items:center; gap:15px;" onclick="viewPlayer('${p.id}')"><img src="${p.img}" class="player-img"><b>${p.user}</b></div>`;
            });

            // تحميل الجوائز
            const { data: awards } = await _supabase.from('awards').select('*').limit(1).single();
            if(awards) {
                document.getElementById('awards-list').innerHTML = `<div class="card" style="text-align:center"><h4>لاعب الشهر</h4><img src="${awards.potm_img}" style="width:120px; border-radius:50%"><br><b>${awards.potm_name}</b></div><div class="card"><h4>هدف الشهر</h4><video controls style="width:100%"><source src="${awards.goal_vid}"></video></div>`;
            }
        }

        async function viewPlayer(pId) {
            const { data: p } = await _supabase.from('players').select('*').eq('id', pId).single();
            const { data: stats } = await _supabase.from('stats').select('*').eq('player_id', pId);
            document.getElementById('player-header').innerHTML = `<img src="${p.img}" style="width:100px; height:100px; border-radius:50%"><h2>${p.name}</h2>`;
            let h = "";
            stats?.forEach(s => { h += `<tr><td>${s.month}</td><td>${s.m}</td><td>${s.g}</td><td>${s.a}</td><td>${s.motm}</td><td>${s.pass}%</td><td>${s.shot}%</td><td>${s.rate}</td></tr>`; });
            document.getElementById('stats-body').innerHTML = h;
            showSec('player-profile');
        }

        // --- وظائف الرفع والإضافة ---
        async function uploadFile(input) {
            const file = input.files[0];
            if(!file) return null;
            const path = `media/${Date.now()}_${file.name}`;
            const { data, error } = await _supabase.storage.from('media').upload(path, file);
            if(error) { alert("فشل الرفع: " + error.message); return null; }
            return SB_URL + "/storage/v1/object/public/media/" + path;
        }

        async function adminAddPlayer() {
            const img = await uploadFile(document.getElementById('adm-p-img'));
            const { error } = await _supabase.from('players').insert({
                name: document.getElementById('adm-p-name').value,
                user: document.getElementById('adm-p-user').value,
                num: document.getElementById('adm-p-num').value,
                pos: document.getElementById('adm-p-pos').value,
                img: img
            });
            if(error) alert(error.message); else { alert("تم الحفظ"); loadData(); }
        }

        async function adminAddNews() {
            const img = await uploadFile(document.getElementById('adm-n-img'));
            const { error } = await _supabase.from('news').insert({
                title: document.getElementById('adm-n-title').value,
                desc: document.getElementById('adm-n-desc').value,
                img: img,
                date: new Date().toLocaleDateString()
            });
            if(error) alert(error.message); else { alert("تم النشر"); loadData(); }
        }

        async function adminUpdateStats() {
            const { error } = await _supabase.from('stats').insert({
                player_id: document.getElementById('adm-stat-player').value,
                month: document.getElementById('adm-stat-month').value,
                m: document.getElementById('adm-stat-m').value,
                g: document.getElementById('adm-stat-g').value,
                a: document.getElementById('adm-stat-a').value,
                pass: document.getElementById('adm-stat-pass').value,
                shot: document.getElementById('adm-stat-shot').value,
                rate: document.getElementById('adm-stat-rate').value
            });
            if(error) alert(error.message); else alert("تم تحديث الإحصائيات");
        }

        async function adminUpdateAwards() {
            const img = await uploadFile(document.getElementById('adm-potm-img'));
            const vid = await uploadFile(document.getElementById('adm-goal-vid'));
            const upd = { potm_name: document.getElementById('adm-potm-name').value };
            if(img) upd.potm_img = img;
            if(vid) upd.goal_vid = vid;
            const { error } = await _supabase.from('awards').upsert(upd);
            if(error) alert(error.message); else { alert("تم تحديث الجوائز"); loadData(); }
        }
    </script>
</body>
</html>
