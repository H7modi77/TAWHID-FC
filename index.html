<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAWHID CLUB | V11 ELITE PRESTIGE</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Chart.js Library -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --gold: #ffcf4b;
            --gold-glow: 0 0 20px rgba(255, 207, 75, 0.5);
            --primary: #00d2ff;
            --bg: #030303;
            --card-bg: rgba(15, 15, 15, 0.8);
            --border: rgba(255, 207, 75, 0.2);
            --neon-blue: #00f2ff;
        }

        * { box-sizing: border-box; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        
        body {
            margin: 0; font-family: 'Cairo', sans-serif; background: var(--bg); color: #fff;
            overflow-x: hidden; scroll-behavior: smooth;
        }

        /* خلفية متحركة احترافية */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #0a1128 0%, #030303 100%);
            z-index: -2;
        }

        /* شريط الأخبار المتطور */
        .news-ticker {
            background: rgba(0,0,0,0.9); border-bottom: 2px solid var(--gold);
            padding: 12px 0; overflow: hidden; position: fixed; top: 0; width: 100%; z-index: 9999;
            backdrop-filter: blur(15px);
        }
        .ticker-content { 
            display: inline-block; white-space: nowrap; animation: ticker 25s linear infinite;
            font-family: 'Orbitron'; color: var(--gold); font-weight: 900; font-size: 14px;
        }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* الهيدر الفاخر */
        header { padding: 160px 20px 60px; text-align: center; position: relative; }
        .logo { 
            width: 160px; filter: drop-shadow(var(--gold-glow));
            animation: float 4s infinite ease-in-out;
        }
        @keyframes float { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-20px) scale(1.05); } }
        
        .club-title { 
            font-family: 'Orbitron'; font-size: 4.5rem; font-weight: 900; 
            background: linear-gradient(to bottom, #fff, var(--gold));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: 12px; margin: 20px 0; text-shadow: var(--gold-glow);
        }

        /* قائمة التنقل العائمة */
        nav { 
            display: flex; justify-content: center; gap: 10px; padding: 15px; 
            position: sticky; top: 50px; z-index: 9000; backdrop-filter: blur(20px); 
            background: rgba(0,0,0,0.7); border-bottom: 1px solid var(--border);
        }
        nav button { 
            background: transparent; border: 1px solid transparent; color: #888; 
            padding: 12px 25px; font-weight: 700; cursor: pointer; border-radius: 5px;
            font-family: 'Orbitron', 'Cairo'; font-size: 13px;
        }
        nav button.active { 
            color: var(--gold); border-color: var(--gold); background: rgba(255,207,75,0.05);
            box-shadow: inset 0 0 15px rgba(255,207,75,0.1);
        }

        .container { max-width: 1250px; margin: auto; padding: 40px 20px; }
        .section { display: none; animation: fadeIn 0.8s ease; }
        .active-section { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        /* كروت الإحصائيات (Glassmorphism) */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; margin-bottom: 40px; }
        .stat-card { 
            background: var(--card-bg); border: 1px solid var(--border); padding: 30px; 
            border-radius: 20px; text-align: center; position: relative; overflow: hidden;
        }
        .stat-card::before { content: ""; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--gold); }
        .stat-card i { font-size: 40px; color: var(--gold); margin-bottom: 15px; opacity: 0.8; }
        .stat-card h3 { font-family: 'Orbitron'; font-size: 32px; margin: 10px 0; color: #fff; }
        .stat-card p { color: #888; font-size: 14px; margin: 0; letter-spacing: 2px; }

        /* التشكيلة التكتيكية (نسخة الـ FUT) */
        .pitch-box {
            background: radial-gradient(circle at center, #0a200a 0%, #000 100%);
            border-radius: 30px; padding: 40px; border: 2px solid #111; margin: auto;
            position: relative; max-width: 700px; height: 900px;
        }
        .pitch-line { position: absolute; border: 2px solid rgba(255,255,255,0.05); }
        .pitch-center { top: 50%; left: 50%; width: 150px; height: 150px; border-radius: 50%; transform: translate(-50%, -50%); }
        
        .fut-player { 
            position: absolute; width: 110px; text-align: center; transform: translate(-50%, -50%); 
            cursor: pointer; z-index: 5;
        }
        .fut-card {
            background: url('https://selimdoyranli.com/cdn/fut-cards/img/card_gold.png');
            background-size: 100% 100%; width: 100px; height: 140px; margin: auto;
            display: flex; align-items: center; justify-content: center; position: relative;
        }
        .fut-player img { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; margin-top: -20px; }
        .fut-player b { display: block; font-size: 11px; color: #000; margin-top: 5px; font-family: 'Orbitron'; font-weight: 900; }

        /* نظام المقارنة VS الرهيب */
        .vs-arena { display: grid; grid-template-columns: 1fr auto 1fr; gap: 30px; align-items: center; }
        .vs-side { background: var(--card-bg); padding: 40px; border-radius: 25px; border: 1px solid #222; text-align: center; }
        .vs-select { 
            width: 100%; padding: 15px; background: #000; color: var(--gold); 
            border: 1px solid var(--gold); border-radius: 10px; font-family: 'Orbitron'; margin-bottom: 25px;
        }
        .radar-chart { width: 100%; height: 300px; }

        /* جداول الإحصائيات الفاخرة */
        .table-container { background: var(--card-bg); border-radius: 20px; overflow: hidden; border: 1px solid var(--border); }
        .elite-table { width: 100%; border-collapse: collapse; }
        .elite-table th { padding: 20px; background: rgba(255,207,75,0.1); color: var(--gold); font-family: 'Orbitron'; font-size: 12px; }
        .elite-table td { padding: 15px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); font-family: 'Orbitron'; }
        .elite-table tr:hover { background: rgba(255,255,255,0.02); }

        /* زر التحميل */
        .loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000;
            display: flex; justify-content: center; align-items: center; z-index: 10000;
        }
    </style>
</head>
<body onload="initApp()">

    <div class="loader" id="loader">
        <div style="text-align:center;">
            <img src="logo.png" width="100" class="logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1165/1165187.png'">
            <h2 style="font-family: Orbitron; letter-spacing: 5px; color: var(--gold);">LOADING ELITE V11...</h2>
        </div>
    </div>

    <div class="news-ticker">
        <div class="ticker-content" id="tickerText">
            ✦ TAWHID FC: THE PINNACLE OF COMPETITIVE GAMING ✦ ALMOUSA3M DOMINATING WITH 441 GOALS ✦ WELCOME TO THE PRESTIGE ERA ✦
        </div>
    </div>

    <header>
        <img src="logo.png" class="logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1165/1165187.png'">
        <h1 class="club-title">TAWHID CLUB</h1>
        <div style="font-family:'Orbitron'; color:var(--primary); font-size: 16px; letter-spacing: 10px; font-weight:900;">V11 ELITE PRESTIGE</div>
    </header>

    <nav>
        <button onclick="showSection('home', this)" class="active"><i class="fas fa-chart-pie"></i> DASHBOARD</button>
        <button onclick="showSection('pitch', this)"><i class="fas fa-Microchip"></i> TACTICAL</button>
        <button onclick="showSection('stats', this)"><i class="fas fa-list-ol"></i> STATISTICS</button>
        <button onclick="showSection('vs', this)"><i class="fas fa-crosshairs"></i> VS ARENA</button>
        <button onclick="showSection('awards', this)"><i class="fas fa-award"></i> HALL OF FAME</button>
    </nav>

    <div class="container">
        
        <!-- DASHBOARD -->
        <section id="home" class="section active-section">
            <div class="stats-grid" id="mainRecords">
                <!-- Auto-Generated -->
            </div>
            
            <div class="table-container" style="padding: 30px;">
                <h2 style="font-family: Orbitron; color: var(--gold);"><i class="fas fa-brain"></i> AI PERFORMANCE TRENDS</h2>
                <canvas id="mainTrendChart" style="max-height: 400px;"></canvas>
            </div>
        </section>

        <!-- TACTICAL PITCH -->
        <section id="pitch" class="section">
            <div class="pitch-box">
                <div class="pitch-line pitch-center"></div>
                <div style="position:absolute; top:50%; width:100%; height:2px; background:rgba(255,255,255,0.05);"></div>
                <div id="futPitch"></div>
            </div>
        </section>

        <!-- STATISTICS -->
        <section id="stats" class="section">
            <div id="allPlayersStats"></div>
        </section>

        <!-- VS ARENA -->
        <section id="vs" class="section">
            <div class="vs-arena">
                <div class="vs-side">
                    <select id="v1" class="vs-select" onchange="compare()"></select>
                    <div id="v1Info"></div>
                    <canvas id="v1Chart" class="radar-chart"></canvas>
                </div>
                <div style="font-family: Orbitron; font-size: 50px; color: var(--gold); text-shadow: var(--gold-glow);">VS</div>
                <div class="vs-side">
                    <select id="v2" class="vs-select" onchange="compare()"></select>
                    <div id="v2Info"></div>
                    <canvas id="v2Chart" class="radar-chart"></canvas>
                </div>
            </div>
        </section>

        <!-- HALL OF FAME -->
        <section id="awards" class="section">
            <div class="stats-grid" id="awardsHall"></div>
            
            <div class="table-container" style="margin-top: 40px; padding: 20px;">
                <h2 style="text-align:center; font-family:Orbitron; color:var(--primary)">GOAL OF THE SEASON (V11)</h2>
                <video controls style="width:100%; border-radius: 15px; border: 2px solid var(--gold);">
                    <source src="https://raw.githubusercontent.com/H7modi77/TAWHID-FC/main/19c9ebcbc1934-master_playlist.mov" type="video/mp4">
                </video>
            </div>
        </section>

    </div>

    <script>
        const players = [
            {name:"Almousa3M", pos:"ST", photo:"p1.png", t:"15%", l:"35%"},
            {name:"H2ssain_28", pos:"ST", photo:"p2.png", t:"15%", l:"65%"},
            {name:"H7modi77", pos:"LW", photo:"p3.png", t:"35%", l:"20%"},
            {name:"Yo0ousef25", pos:"RW", photo:"p4.png", t:"35%", l:"80%"},
            {name:"M---_11_11", pos:"CM", photo:"p5.png", t:"60%", l:"50%"},
            {name:"Basabeso2", pos:"CB", photo:"p6.png", t:"85%", l:"50%"}
        ];

        const statsData = {
            Almousa3M: { October:{m:58,g:65,a:61,p:78,w:60}, November:{m:57,g:67,a:72,p:77,w:53}, January:{m:126,g:161,a:146,p:77,w:49}, February:{m:42,g:48,a:41,p:77,w:49} },
            H2ssain_28: { October:{m:44,g:36,a:15,p:76,w:56}, November:{m:64,g:59,a:48,p:77,w:51}, January:{m:146,g:144,a:72,p:73,w:44}, February:{m:31,g:31,a:55,p:73,w:44} },
            H7modi77: { October:{m:45,g:14,a:36,p:79,w:62}, November:{m:77,g:52,a:54,p:76,w:51}, January:{m:116,g:44,a:85,p:75,w:47}, February:{m:44,g:20,a:26,p:75,w:47} },
            "M---_11_11": { October:{m:68,g:38,a:43,p:81,w:57,cs:2}, November:{m:86,g:48,a:58,p:74,w:54,cs:3}, January:{m:158,g:112,a:113,p:75,w:46,cs:5}, February:{m:40,g:24,a:19,p:75,w:46,cs:2} },
            Yo0ousef25: { October:{m:28,g:23,a:5,p:78,w:67}, November:{m:26,g:21,a:8,p:78,w:58}, January:{m:99,g:57,a:17,p:74,w:43}, February:{m:18,g:11,a:2,p:74,w:43} },
            Basabeso2: { February:{m:24,g:2,a:3,p:85,w:50,cs:4} }
        };

        let radar1, radar2;

        function calcRating(d) {
            if(!d || d.m === 0) return 0;
            return Math.min(99, (((d.g*1.8 + d.a*1.5 + (d.p/10)) / d.m) * 6 + 40)).toFixed(1);
        }

        function initApp() {
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                renderData();
                renderMainChart();
                compare();
            }, 1500);
        }

        function showSection(id, btn) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active-section'));
            document.getElementById(id).classList.add('active-section');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function renderData() {
            const records = document.getElementById('mainRecords');
            const pitch = document.getElementById('futPitch');
            const statsCont = document.getElementById('allPlayersStats');
            const v1 = document.getElementById('v1');
            const v2 = document.getElementById('v2');
            const hall = document.getElementById('awardsHall');

            let clubGoals = 0, clubAssists = 0;

            players.forEach(p => {
                // Tactical Pitch
                pitch.innerHTML += `
                    <div class="fut-player" style="top:${p.t}; left:${p.l}">
                        <div class="fut-card"><img src="${p.photo}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2102/2102633.png'"></div>
                        <b>${p.name}</b>
                    </div>`;

                // Stats Aggregate
                let tg=0, ta=0, tm=0;
                let playerTable = `<div class="table-container" style="margin-bottom:30px;"><h3 style="padding:20px; color:var(--gold); font-family:Orbitron;">${p.name} FULL REPORT</h3><table class="elite-table"><thead><tr><th>MONTH</th><th>MATCHES</th><th>GOALS</th><th>ASSISTS</th><th>RATING</th></tr></thead><tbody>`;
                
                for(let m in statsData[p.name]) {
                    let d = statsData[p.name][m];
                    tg+=d.g; ta+=d.a; tm+=d.m;
                    playerTable += `<tr><td>${m}</td><td>${d.m}</td><td>${d.g}</td><td>${d.a}</td><td style="color:var(--gold)">${calcRating(d)}</td></tr>`;
                }
                clubGoals += tg; clubAssists += ta;
                statsCont.innerHTML += playerTable + `</tbody></table></div>`;

                // Selects
                v1.innerHTML += `<option value="${p.name}">${p.name}</option>`;
                v2.innerHTML += `<option value="${p.name}">${p.name}</option>`;
            });

            records.innerHTML = `
                <div class="stat-card"><i class="fas fa-futbol"></i><p>CLUB GOALS</p><h3>${clubGoals}</h3></div>
                <div class="stat-card"><i class="fas fa-hands-helping"></i><p>CLUB ASSISTS</p><h3>${clubAssists}</h3></div>
                <div class="stat-card"><i class="fas fa-chart-line"></i><p>WIN RATE</p><h3>54%</h3></div>
            `;

            // Awards Hall
            const trophyIcons = ["fa-crown", "fa-medal", "fa-fire", "fa-star"];
            const trophyMonths = ["OCTOBER", "NOVEMBER", "JANUARY", "FEBRUARY"];
            const winners = ["M---_11_11", "H2ssain_28", "Almousa3M", "Almousa3M"];
            
            winners.forEach((w, i) => {
                hall.innerHTML += `
                <div class="stat-card">
                    <i class="fas ${trophyIcons[i]}"></i>
                    <p>${trophyMonths[i]} MVP</p>
                    <h3 style="font-size:18px;">${w}</h3>
                </div>`;
            });

            v2.selectedIndex = 1;
        }

        function renderMainChart() {
            const ctx = document.getElementById('mainTrendChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['October', 'November', 'January', 'February'],
                    datasets: [{
                        label: 'Team Performance Index',
                        data: [75, 82, 91, 88],
                        borderColor: '#ffcf4b',
                        tension: 0.4,
                        fill: true,
                        backgroundColor: 'rgba(255, 207, 75, 0.1)'
                    }]
                },
                options: { plugins: { legend: { labels: { color: '#fff' } } }, scales: { y: { grid: { color: '#222' }, ticks: { color: '#888' } }, x: { ticks: { color: '#888' } } } }
            });
        }

        function compare() {
            const p1 = document.getElementById('v1').value;
            const p2 = document.getElementById('v2').value;

            [p1, p2].forEach((name, i) => {
                let g=0, a=0, m=0;
                for(let mo in statsData[name]) { g+=statsData[name][mo].g; a+=statsData[name][mo].a; m+=statsData[name][mo].m; }
                
                const rate = calcRating({g, a, m, p:75});
                document.getElementById(`v${i+1}Info`).innerHTML = `<h1 style="color:var(--gold); font-family:Orbitron; margin:0;">${rate}</h1><p>G: ${g} | A: ${a}</p>`;
                
                renderRadar(`v${i+1}Chart`, name, i);
            });
        }

        function renderRadar(id, name, idx) {
            const ctx = document.getElementById(id).getContext('2d');
            const data = idx === 0 ? [90, 85, 70, 88, 40] : [80, 75, 95, 70, 50]; // Static for demo, could be dynamic
            
            if(window[`chartObj${idx}`]) window[`chartObj${idx}`].destroy();

            window[`chartObj${idx}`] = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['Shooting', 'Passing', 'Speed', 'Dribbling', 'Defense'],
                    datasets: [{
                        label: name,
                        data: data,
                        backgroundColor: 'rgba(0, 242, 255, 0.2)',
                        borderColor: '#00f2ff',
                        pointBackgroundColor: '#fff'
                    }]
                },
                options: {
                    scales: { r: { grid: { color: '#333' }, angleLines: { color: '#333' }, pointLabels: { color: '#fff' }, ticks: { display: false } } },
                    plugins: { legend: { display: false } }
                }
            });
        }
    </script>
</body>
</html>
