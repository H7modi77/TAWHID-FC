<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAWHID CLUB | ELITE SYSTEM V4</title>
    
    <!-- Fonts & Libraries -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://unpkg.com/sweetalert/dist/sweetalert.min.js"></script>

    <style>
        :root {
            --primary: #00d2ff; --accent: #ffae00; --bg: #030712;
            --glass: rgba(255, 255, 255, 0.05);
            --gold: linear-gradient(45deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
        }

        * { box-sizing: border-box; transition: all 0.3s ease; }
        body {
            margin: 0; font-family: 'Cairo', sans-serif; background: var(--bg); color: white;
            overflow-x: hidden; padding-bottom: 80px;
        }

        /* Background Layer */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1e293b 0%, #030712 100%);
            z-index: -2;
        }

        header { padding: 30px; text-align: center; border-bottom: 1px solid var(--glass); }
        .logo-main { width: 90px; filter: drop-shadow(0 0 15px var(--primary)); }

        nav {
            display: flex; justify-content: center; gap: 8px; padding: 12px;
            position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(15px); background: rgba(0,0,0,0.7);
            overflow-x: auto;
        }
        nav button {
            background: var(--glass); border: 1px solid var(--glass); color: white;
            padding: 8px 15px; border-radius: 12px; cursor: pointer; font-size: 13px; font-weight: bold;
        }
        nav button.active { background: var(--primary); color: #000; box-shadow: 0 0 15px var(--primary); }

        .container { max-width: 1200px; margin: auto; padding: 15px; }
        .section { display: none; animation: fadeIn 0.5s ease; }
        .active-section { display: block; }
        @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

        /* Match Center */
        .match-card {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            border-radius: 20px; padding: 20px; margin-bottom: 25px;
            display: flex; justify-content: space-around; align-items: center;
            border: 1px solid var(--primary); text-align: center;
        }

        /* Football Pitch */
        .pitch-container {
            width: 100%; max-width: 500px; height: 600px; background: #2e7d32;
            margin: 20px auto; border: 4px solid white; position: relative; border-radius: 15px;
            background-image: repeating-linear-gradient(0deg, #388e3c, #388e3c 40px, #2e7d32 40px, #2e7d32 80px);
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        .pitch-circle { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80px; height: 80px; border: 2px solid white; border-radius: 50%; }
        .pitch-line { position: absolute; top: 50%; width: 100%; height: 2px; background: white; }
        .player-on-pitch { position: absolute; text-align: center; width: 70px; transform: translate(-50%, -50%); }
        .player-on-pitch img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--gold); background: #000; }
        .player-on-pitch span { display: block; font-size: 10px; background: rgba(0,0,0,0.8); padding: 2px; border-radius: 5px; margin-top: 3px; }

        /* Player Cards */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        .player-card {
            background: var(--glass); border-radius: 20px; padding: 15px; text-align: center;
            border: 1px solid var(--glass); position: relative; cursor: pointer;
        }
        .player-card:hover { border-color: var(--primary); transform: translateY(-5px); }
        .player-card img { width: 100%; border-radius: 15px; margin-bottom: 10px; }
        .market-val { color: var(--accent); font-family: 'Orbitron'; font-size: 12px; font-weight: bold; }

        /* Modal & Deep Stats */
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index: 2000; overflow-y: auto; padding: 15px; }
        .modal-content { background: #0f172a; max-width: 750px; margin: auto; border-radius: 25px; padding: 20px; border: 1px solid var(--primary); }
        
        .monthly-stat-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 12px; }
        .monthly-stat-table th, .monthly-stat-table td { padding: 10px; border-bottom: 1px solid var(--glass); text-align: center; }
        .monthly-stat-table th { background: var(--primary); color: #000; }

        .radar-box { max-width: 300px; margin: 20px auto; }

        /* Ranking */
        .rank-0 { border: 2px solid var(--gold) !important; box-shadow: 0 0 20px rgba(255,215,0,0.2); }
        .rank-1 { border: 2px solid var(--silver) !important; }
        .rank-2 { border: 2px solid var(--bronze) !important; }

        /* Sponsors */
        footer.sponsors { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.9); display: flex; justify-content: center; gap: 20px; padding: 10px; border-top: 1px solid var(--glass); }
        .sponsors img { height: 30px; opacity: 0.5; border: 1px solid transparent; padding: 2px; }
        .sponsors img:hover { opacity: 1; border-color: var(--primary); }
    </style>
</head>
<body>

    <header>
        <img src="logo.png" class="logo-main" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1165/1165187.png'">
        <h1 style="font-family:'Orbitron'; font-size: 24px; margin: 10px 0;">TAWHID CLUB</h1>
        <p id="timer" style="color:var(--primary); font-size:12px;"></p>
    </header>

    <nav>
        <button onclick="show('home', this)" class="active">الرئيسية</button>
        <button onclick="show('team', this)">اللاعبين</button>
        <button onclick="show('pitch', this)">التشكيلة</button>
        <button onclick="show('ranking', this)">الترتيب</button>
        <button onclick="show('admin', this)">الإدارة</button>
    </nav>

    <div class="container">
        <!-- HOME -->
        <section id="home" class="section active-section">
            <div class="match-card">
                <div><p>آخر نتيجة</p><h3>TAWHID 4 - 2 PRO</h3></div>
                <div style="font-size:24px; color:var(--primary)">VS</div>
                <div><p>المباراة القادمة</p><h3>TAWHID vs GIANTS</h3></div>
            </div>
            <h2>آخر الأخبار</h2>
            <div id="newsBox">
                <div class="match-card" style="text-align:right; justify-content: flex-start; gap:20px;">
                    <img src="news1.png" style="width:80px; border-radius:10px;" onerror="this.src='https://images.unsplash.com/photo-1574629810360-7efbbe195018?w=200'">
                    <div>
                        <small class="news-date">25 فبراير 2026</small>
                        <h4 style="margin:5px 0;">اجتماع طارئ لأعضاء النادي</h4>
                    </div>
                </div>
            </div>
        </section>

        <!-- TEAM -->
        <section id="team" class="section">
            <div class="grid" id="teamGrid"></div>
        </section>

        <!-- PITCH -->
        <section id="pitch" class="section">
            <h2 style="text-align:center">التشكيلة المثالية (Best XI)</h2>
            <div class="pitch-container" id="pitchBody">
                <div class="pitch-line"></div>
                <div class="pitch-circle"></div>
                <!-- Players injected here -->
            </div>
        </section>

        <!-- RANKING -->
        <section id="ranking" class="section">
            <h2>التصنيف الملكي (Global AI)</h2>
            <div id="rankingGrid" class="grid"></div>
        </section>

        <!-- ADMIN -->
        <section id="admin" class="section">
            <div style="max-width:400px; margin:auto; background:var(--glass); padding:30px; border-radius:20px;">
                <h3>دخول الإدارة</h3>
                <input type="password" id="pass" placeholder="Password" style="width:100%; padding:10px; background:transparent; color:white; border:1px solid var(--primary); border-radius:10px;">
                <button onclick="login()" style="width:100%; padding:10px; background:var(--primary); border:none; border-radius:10px; margin-top:10px; cursor:pointer;">دخول</button>
            </div>
        </section>
    </div>

    <!-- MODAL -->
    <div id="playerModal" class="modal" onclick="closeM(event)">
        <div class="modal-content" id="modalArea">
            <div id="captureZone">
                <div id="modalTop" style="text-align:center"></div>
                <div class="radar-box"><canvas id="radarChart"></canvas></div>
                <h3>التقييم الشهري المفصل</h3>
                <div style="overflow-x:auto">
                    <table class="monthly-stat-table">
                        <thead>
                            <tr><th>الشهر</th><th>لعب</th><th>سجل</th><th>صنع</th><th>فوز</th><th>AI</th></tr>
                        </thead>
                        <tbody id="monthlyBody"></tbody>
                    </table>
                </div>
            </div>
            <button onclick="downloadCard()" style="width:100%; margin-top:15px; padding:10px; background:var(--gold); border:none; color:black; font-weight:bold; border-radius:10px; cursor:pointer;">تحميل بطاقة اللاعب (PNG)</button>
        </div>
    </div>

    <footer class="sponsors">
        <img src="sponsor1.png" onerror="this.src='https://upload.wikimedia.org/wikipedia/en/thumb/4/43/EA_Sports_FC_logo.svg/1200px-EA_Sports_FC_logo.svg.png'">
        <img src="sponsor2.png" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/thumb/a/ad/Adidas_Logo.svg/1200px-Adidas_Logo.svg.png'">
    </footer>

    <script>
        // --- DATA ---
        const players = [
            {name:"Basabeso2", photo:"basabeso2.png", pos:"Defender", skills:[70,40,65,55,85,80]},
            {name:"M---_11_11", photo:"m1111.png", pos:"Midfield", skills:[85,82,90,85,60,70]},
            {name:"H7modi77", photo:"h7modi77.png", pos:"Midfield/Attack", skills:[88,85,88,82,55,65]},
            {name:"Almousa3M", photo:"almousa3m.png", pos:"Attack", skills:[92,98,85,90,40,60]},
            {name:"H2ssain_28", photo:"h2ssain28.png", pos:"Attack", skills:[85,92,75,80,45,68]},
            {name:"Yo0ousef25", photo:"yo0ousef25.png", pos:"Attack", skills:[80,78,70,75,50,60]}
        ];

        const statsData = {
            Basabeso2:{February:{m:24,g:2,a:3,p:85,w:50}},
            "M---_11_11":{October:{m:68,g:38,a:43,p:81,w:57},November:{m:86,g:48,a:58,p:74,w:54},January:{m:158,g:112,a:113,p:75,w:46},February:{m:40,g:24,a:19,p:75,w:46}},
            H7modi77:{October:{m:45,g:14,a:36,p:79,w:62},November:{m:77,g:52,a:54,p:76,w:51},January:{m:116,g:44,a:85,p:75,w:47},February:{m:44,g:20,a:26,p:75,w:47}},
            Almousa3M:{October:{m:58,g:65,a:61,p:78,w:60},November:{m:57,g:67,a:72,p:77,w:53},January:{m:126,g:161,a:146,p:77,w:49},February:{m:42,g:48,a:41,p:77,w:49}},
            H2ssain_28:{October:{m:44,g:36,a:15,p:76,w:56},November:{m:64,g:59,a:48,p:77,w:51},January:{m:146,g:144,a:72,p:73,w:44},February:{m:31,g:31,a:55,p:73,w:44}},
            Yo0ousef25:{October:{m:28,g:23,a:5,p:78,w:67},November:{m:26,g:21,a:8,p:78,w:58},January:{m:99,g:57,a:17,p:74,w:43},February:{m:18,g:11,a:2,p:74,w:43}}
        };

        // --- LOGIC ---
        function show(id, btn) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active-section'));
            document.getElementById(id).classList.add('active-section');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if(id === 'pitch') renderPitch();
        }

        function calcAI(d) {
            return Math.round((d.g*2.5 + d.a*2 + d.p*0.5 + d.w*1)/10 + 40);
        }

        function getGlobalStats(name) {
            let months = statsData[name];
            let t = {m:0, g:0, a:0, p:0, w:0, count:0};
            for(let m in months) {
                t.m+=months[m].m; t.g+=months[m].g; t.a+=months[m].a;
                t.p+=months[m].p; t.w+=months[m].w; t.count++;
            }
            let avg = {m:t.m, g:t.g, a:t.a, p:Math.round(t.p/t.count), w:Math.round(t.w/t.count)};
            return { ...avg, ai: calcAI(avg) };
        }

        function renderTeam() {
            const grid = document.getElementById('teamGrid');
            grid.innerHTML = '';
            players.forEach(p => {
                const s = getGlobalStats(p.name);
                grid.innerHTML += `
                    <div class="player-card" onclick="openPlayer('${p.name}')">
                        <div style="position:absolute; top:5px; left:5px; background:var(--primary); color:black; padding:2px 5px; border-radius:5px; font-weight:bold; font-size:12px;">${s.ai}</div>
                        <img src="${p.photo}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2102/2102647.png'">
                        <h4 style="margin:5px 0;">${p.name}</h4>
                        <div class="market-val">${(s.ai * 0.8).toFixed(1)}M €</div>
                    </div>`;
            });
        }

        function renderRanking() {
            const grid = document.getElementById('rankingGrid');
            const sorted = [...players].sort((a,b) => getGlobalStats(b.name).ai - getGlobalStats(a.name).ai);
            grid.innerHTML = '';
            sorted.forEach((p, i) => {
                const s = getGlobalStats(p.name);
                grid.innerHTML += `
                    <div class="player-card rank-${i}">
                        <h3>#${i+1}</h3>
                        <img src="${p.photo}" style="width:60px; height:60px; border-radius:50%;" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2102/2102647.png'">
                        <h4>${p.name}</h4>
                        <p>Rating: ${s.ai}</p>
                    </div>`;
            });
        }

        let currentChart;
        function openPlayer(name) {
            const p = players.find(x => x.name === name);
            const s = getGlobalStats(name);
            const months = statsData[name];
            
            document.getElementById('modalTop').innerHTML = `
                <img src="${p.photo}" style="width:100px; border-radius:50%; border:3px solid var(--primary)" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2102/2102647.png'">
                <h2 style="margin:10px 0;">${name}</h2>
                <div style="display:flex; justify-content:center; gap:20px; color:var(--accent); font-weight:bold;">
                    <span>AI: ${s.ai}</span> | <span>Price: ${(s.ai * 0.8).toFixed(1)}M €</span>
                </div>
            `;

            const mBody = document.getElementById('monthlyBody');
            mBody.innerHTML = '';
            for(let m in months) {
                let d = months[m];
                mBody.innerHTML += `<tr><td>${m}</td><td>${d.m}</td><td>${d.g}</td><td>${d.a}</td><td>${d.w}%</td><td>${calcAI(d)}</td></tr>`;
            }

            document.getElementById('playerModal').style.display = 'block';

            // Radar Chart
            const ctx = document.getElementById('radarChart').getContext('2d');
            if(currentChart) currentChart.destroy();
            currentChart = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['سرعة', 'تسديد', 'تمرير', 'مراوغة', 'دفاع', 'بدني'],
                    datasets: [{
                        label: 'Skills',
                        data: p.skills,
                        backgroundColor: 'rgba(0, 210, 255, 0.2)',
                        borderColor: '#00d2ff',
                        borderWidth: 2
                    }]
                },
                options: { 
                    scales: { r: { min: 0, max: 100, ticks: { display: false }, grid: { color: 'rgba(255,255,255,0.1)' } } },
                    plugins: { legend: { display: false } }
                }
            });
        }

        function renderPitch() {
            const body = document.getElementById('pitchBody');
            body.innerHTML = '<div class="pitch-line"></div><div class="pitch-circle"></div>';
            const posMap = [
                { top: '85%', left: '50%' }, // GK/Def
                { top: '65%', left: '50%' }, // Mid
                { top: '40%', left: '30%' }, // Mid
                { top: '40%', left: '70%' }, // Mid
                { top: '20%', left: '40%' }, // Att
                { top: '20%', left: '60%' }, // Att
            ];
            players.forEach((p, i) => {
                body.innerHTML += `
                    <div class="player-on-pitch" style="top:${posMap[i].top}; left:${posMap[i].left};">
                        <img src="${p.photo}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2102/2102647.png'">
                        <span>${p.name}</span>
                    </div>`;
            });
        }

        function downloadCard() {
            html2canvas(document.getElementById('captureZone'), { backgroundColor: '#0f172a' }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'Tawhid_Card.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        }

        function closeM(e) { if(e.target.id === 'playerModal') document.getElementById('playerModal').style.display='none'; }
        
        function login() {
            if(document.getElementById('pass').value === "2") {
                swal("أهلاً يا قائد", "تم دخول لوحة التحكم", "success");
            } else swal("خطأ", "كلمة المرور غير صحيحة", "error");
        }

        // Timer
        setInterval(() => {
            const now = new Date();
            document.getElementById('timer').innerText = now.toLocaleString('ar-SA');
        }, 1000);

        window.onload = () => { renderTeam(); renderRanking(); };
    </script>
</body>
</html>
