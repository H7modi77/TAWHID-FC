<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TAWHID FC Ultimate</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* ===== GENERAL ===== */

body{
margin:0;
font-family:sans-serif;
background:#eef2ff;
color:#333;
transition:.3s;
overflow-x:hidden;
}

header{
text-align:center;
background:white;
padding:12px;
box-shadow:0 3px 8px rgba(0,0,0,.2);
}

header img{width:80px}

nav{
display:flex;
flex-wrap:wrap;
}

nav button{
flex:1;
min-width:100px;
background:#2563eb;
color:white;
border:none;
padding:12px;
cursor:pointer;
margin:2px;
transition:.25s;
}

nav button:hover{
transform:translateY(-2px);
background:#1d4ed8;
}

.section{
display:none;
padding:15px;
animation:fade .4s ease;
}

.active{display:block}

@keyframes fade{
from{opacity:0;transform:translateY(10px)}
to{opacity:1;transform:translateY(0)}
}

.card{
background:white;
border-radius:15px;
padding:15px;
margin-bottom:15px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

/* ===== PLAYERS ===== */

.player{
text-align:center;
margin:6px;
display:inline-block;
cursor:pointer;
transition:.25s;
}

.player:hover{
transform:scale(1.08);
}

.player img{
width:65px;
height:65px;
border-radius:50%;
border:2px solid #2563eb;
object-fit:cover;
}

/* ===== MODAL ===== */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#0009;
display:none;
z-index:9999;
overflow-y:auto;
padding:20px 0;
}

.modalBox{
background:white;
margin:auto;
padding:15px;
border-radius:15px;
width:90%;
max-width:800px;
max-height:90vh;
overflow-y:auto;
position:relative;
animation:fade .3s;
}

.close{
position:absolute;
top:10px;
right:15px;
font-size:28px;
cursor:pointer;
}

/* ===== TABLE ===== */

table{
width:100%;
border-collapse:collapse;
font-size:12px;
margin-top:10px;
}

th,td{
border:1px solid #ccc;
padding:6px;
text-align:center;
}

video,img{
width:100%;
border-radius:10px;
margin-top:8px
}

/* ===== SPONSORS ===== */

.sponsors{text-align:center;margin-top:15px;}
.sponsors img{width:120px;margin:10px}

/* ===== INPUT ===== */

input{
width:100%;
padding:8px;
margin-bottom:10px;
border-radius:5px;
border:1px solid #ccc
}

/* ===== DARK MODE ===== */

.dark-mode{
background:#0b0f1a;
color:#eee;
}

.dark-mode .card,
.dark-mode header,
.dark-mode .modalBox{
background:#111827;
color:white;
}

.dark-mode nav button{
background:#374151;
}

</style>
</head>

<body>

<header>
<img src="logo.png"><br>
<b>TAWHID FC Ultimate</b>
</header>

<nav>
<button onclick="show('home')">الرئيسية</button>
<button onclick="show('team')">الفريق</button>
<button onclick="show('awards')">الجوائز</button>
<button onclick="toggleDark()">الوضع الليلي</button>
</nav>

<div id="home" class="section active"></div>
<div id="team" class="section"></div>
<div id="awards" class="section"></div>

<div class="modal" id="modal">
<div class="modalBox" id="modalBox"></div>
</div>

<script>

/* ===== NEWS ===== */

const news=[
{
title:`يتقدم نادي TAWHID FC بأصدق التهاني والتبريكات بمناسبة حلول شهر رمضان المبارك،
سائلين الله أن يجعله شهر خير وبركة،
وأن يتقبل منا ومنكم الصيام والقيام وصالح الأعمال.`,
time:"2026-02-18",
img:"ramadan.png"
},
{title:"يعلن نادي TAWHID FC عن توقيع التعاون الرسمي مع ECMassage.",time:"2026-02-13",img:"ecmassage.png"}
];

/* ===== PLAYERS ===== */

const players=[
{name:"H7modi77",photo:"h7.jpg",pos:"Midfield",monthly:[["Oct",45,14,36,79,33,2,5,62],["Nov",77,52,54,76,43,9,2,51],["Jan",116,44,85,75,38,19,25,47]]},
{name:"M-_-_-_11_11",photo:"m.jpg",pos:"Midfield",monthly:[["Oct",68,38,43,81,27,9,1,57],["Nov",86,48,58,74,29,10,0,54],["Jan",158,112,113,75,34,33,7,46]]},
{name:"Almousa3M",photo:"a.jpg",pos:"Attack",monthly:[["Oct",58,65,61,78,33,18,1,60],["Nov",57,67,72,77,33,15,0,53],["Jan",126,161,146,77,40,24,1,49]]},
{name:"H2ssain_28",photo:"h2.jpg",pos:"Attack",monthly:[["Oct",44,36,15,76,23,1,0,56],["Nov",64,59,48,77,25,8,2,51],["Jan",146,144,72,73,28,9,7,44]]},
{name:"Yo0ousef25",photo:"y.jpg",pos:"Attack",monthly:[["Oct",28,23,5,78,46,0,0,67],["Nov",26,21,8,78,52,3,1,58],["Jan",99,57,17,74,47,0,5,43]]},
{name:"Basabeso2",photo:"b.jpg",pos:"Attack",monthly:[["Oct",48,36,17,84,40,7,1,62],["Nov",75,54,22,86,39,9,0,57],["Jan",91,84,43,85,41,5,8,49]]}
];

/* ===== AI CALC ===== */

players.forEach(p=>{
 p.monthly.forEach(m=>{
   m.push(+(m[2]*2.1+m[3]*2.1+m[4]*1.5+m[5]*2.5+m[8]*1.5).toFixed(1));
 });
 p.totalAI=p.monthly.reduce((a,b)=>a+b[9],0);
});

/* ترتيب تلقائي */
players.sort((a,b)=>b.totalAI-a.totalAI);

/* ===== RENDER ===== */

home.innerHTML=news.map(n=>`
<div class="card">
<img src="${n.img}">
<b>${n.title}</b><br>${n.time}
</div>`).join('')+sponsor();

team.innerHTML=`<input placeholder="ابحث عن لاعب" onkeyup="search(this.value)">`+renderTeam()+sponsor();

awards.innerHTML=`
<div class="card"><h3>Ballon d'Or AI</h3><canvas id="ballonChart"></canvas></div>
`+sponsor();

/* ===== TEAM ===== */

function renderTeam(){
 let h='';
 ['Midfield','Attack'].forEach(pos=>{
 h+=`<div class='card'><h3>${pos}</h3>`;
 players.filter(p=>p.pos==pos).forEach(p=>{
 h+=`<div class='player' onclick="openPlayer('${p.name}')">
 <img src='${p.photo}'><br><b>${p.name}</b></div>`;
 });
 h+='</div>';
 });
 return h;
}

/* ===== MODAL ===== */

function openPlayer(n){

let p=players.find(x=>x.name==n);

modal.style.display='block';
document.body.style.overflow='hidden';

let last=p.monthly[p.monthly.length-1];

modalBox.innerHTML=`
<span class='close' onclick="closeModal()">&times;</span>
<h2>${p.name}</h2>
<img src='${p.photo}'>
<h3>Total AI: ${p.totalAI.toFixed(1)}</h3>

<canvas id='playerChart'></canvas>
<canvas id='playerRadar'></canvas>

<table>
<tr><th>Month</th><th>M</th><th>G</th><th>A</th><th>P%</th><th>S%</th><th>MOTM</th><th>Red</th><th>W%</th><th>AI</th></tr>
${p.monthly.map(m=>`<tr>${m.map(x=>`<td>${x}</td>`).join('')}</tr>`).join('')}
</table>
`;

new Chart(playerChart,{
type:'bar',
data:{labels:p.monthly.map(m=>m[0]),
datasets:[{label:'AI',data:p.monthly.map(m=>m[9])}]}
});

new Chart(playerRadar,{
type:'radar',
data:{
labels:['Goals','Assists','Pass%','Shot%','Win%'],
datasets:[{label:p.name,data:[last[2],last[3],last[4],last[5],last[8]]}]
}
});
}

function closeModal(){
modal.style.display='none';
document.body.style.overflow='auto';
}

modal.addEventListener('click',e=>{
if(e.target===modal) closeModal();
});

/* ===== SEARCH ===== */

function search(v){
document.querySelectorAll('.player').forEach(p=>{
p.style.display=p.innerText.toLowerCase().includes(v.toLowerCase())
?'inline-block':'none';
});
}

/* ===== NAV ===== */

function show(id){
document.querySelectorAll('.section')
.forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

/* ===== SPONSORS ===== */

function sponsor(){
return `<div class='sponsors'>
<img src='ecmassage.png'>
<img src='doubleb.png'>
</div>`;
}

/* ===== DARK MODE ===== */

function toggleDark(){
document.body.classList.toggle('dark-mode');
}

/* ===== MAIN CHART ===== */

new Chart(ballonChart,{
type:'bar',
data:{
labels:players.map(p=>p.name),
datasets:[{label:'Total AI',data:players.map(p=>p.totalAI)}]
}
});

</script>

</body>
</html>
