<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TAWHID FC | ELITE V13</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #6b21a8; --bg: #ffffff; --card: #f9fafb; --text: #111827; --accent: #fbbf24; --border: #e5e7eb; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Cairo', sans-serif; padding-bottom: 90px; }
        .section { display: none; padding: 15px; } .active { display: block; }
        .card { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 1px solid var(--border); }
        #login-overlay { position: fixed; inset: 0; background: var(--primary); z-index: 100000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .pin-input { background: rgba(255,255,255,0.1); border: 2px solid white; border-radius: 15px; padding: 15px; width: 200px; text-align: center; font-size: 28px; color: white; outline: none; }
        nav { position: fixed; bottom: 15px; left: 15px; right: 15px; background: white; border-radius: 30px; display: flex; justify-content: space-around; padding: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        nav button { background: none; border: none; color: #ccc; font-size: 20px; }
        nav button.active { color: var(--primary); }
        input, select, textarea { width: 100%; padding: 10px; margin-top: 5px; border-radius: 10px; border: 1px solid #ddd; }
        .btn-save { background: var(--primary); color: white; border: none; width: 100%; padding: 12px; border-radius: 10px; margin-top: 10px; font-weight: bold; }
        .top-bar { padding: 15px; background: white; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <h2>TAWHID FC</h2>
        <input type="password" id="pin-input" class="pin-input" maxlength="2" placeholder="••">
        <button onclick="checkAuth()" style="margin-top:20px; padding:10px 30px; border-radius:20px; border:none; font-weight:bold;">دخول</button>
    </div>

    <div class="top-bar">
        <span id="back-btn" style="cursor:pointer; display:none" onclick="showSec('news')"><i class="fas fa-arrow-right"></i></span>
        <strong style="color: var(--primary)">TAWHID FC</strong>
        <i id="admin-icon" class="fas fa-cog" style="display:none" onclick="showSec('admin')"></i>
    </div>

    <div class="container">
        <section id="news-sec" class="section active"><h3>أخبار النادي</h3><div id="news-list"></div></section>
        <section id="squad-sec" class="section"><h3>اللاعبين</h3><div id="squad-list"></div></section>
        <section id="awards-sec" class="section"><h3>الجوائز</h3><div id="awards-list"></div></section>
        
        <section id="admin-sec" class="section">
            <h3>لوحة التحكم (07)</h3>
            <div class="card">
                <h4>إضافة لاعب</h4>
                <input type="text" id="p-name" placeholder="الاسم الكامل">
                <input type="text" id="p-user" placeholder="اليوزر">
                <input type="number" id="p-num" placeholder="الرقم">
                <select id="p-pos"><option value="1">حارس</option><option value="2">دفاع</option><option value="3">وسط</option><option value="4">هجوم</option></select>
                <input type="file" id="p-img" accept="image/*">
                <button class="btn-save" onclick="addPlayer()">حفظ</button>
            </div>
            <!-- يمكنك إضافة المزيد من الخانات هنا لاحقاً بنفس الطريقة -->
        </section>
    </div>

    <nav>
        <button onclick="showSec('news')" id="btn-news" class="active"><i class="fas fa-home"></i></button>
        <button onclick="showSec('squad')" id="btn-squad"><i class="fas fa-users"></i></button>
        <button onclick="showSec('awards')" id="btn-awards"><i class="fas fa-award"></i></button>
    </nav>

    <script>
        // --- بيانات الربط ---
        const SB_URL = "https://pgpjdwltezrxmpnuqvem.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBncGpkd2x0ZXpyeG1wbnVxdmVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4MzUwMjgsImV4cCI6MjA5MjQxMTAyOH0.KtVZAP-EhFAw1gonKGn4ulXVJp-tjKZVFIMNEfES7ho";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let userPin = "";
        let isAdmin = false;

        function checkAuth() {
            const pin = document.getElementById('pin-input').value;
            if(["07", "78", "28", "29", "08", "02"].includes(pin)) {
                userPin = pin;
                isAdmin = (pin === "07");
                document.getElementById('login-overlay').style.display = 'none';
                if(isAdmin) document.getElementById('admin-icon').style.display = 'block';
                loadData();
            } else { alert("خطأ!"); }
        }

        function showSec(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id + '-sec').classList.add('active');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            if(document.getElementById('btn-'+id)) document.getElementById('btn-'+id).classList.add('active');
            document.getElementById('back-btn').style.display = (id === 'news' ? 'none' : 'block');
        }

        async function loadData() {
            // جلب الأخبار
            const { data: news } = await _supabase.from('news').select('*');
            if(news) {
                const list = document.getElementById('news-list');
                list.innerHTML = "";
                news.forEach(n => {
                    list.innerHTML += `<div class="card"><h4>${n.title}</h4><img src="${n.img}" style="width:100%"><p>${n.desc}</p></div>`;
                });
            }
            // جلب اللاعبين
            const { data: players } = await _supabase.from('players').select('*').order('pos');
            if(players) {
                const list = document.getElementById('squad-list');
                list.innerHTML = "";
                players.forEach(p => {
                    list.innerHTML += `<div class="card" style="display:flex; align-items:center; gap:15px;"><img src="${p.img}" style="width:50px; height:50px; border-radius:50%"><b>${p.user}</b></div>`;
                });
            }
        }

        // دالة رفع الصور لـ Supabase
        async function uploadFile(fileInput) {
            const file = fileInput.files[0];
            if(!file) return null;
            const fileName = Date.now() + "_" + file.name;
            const { data, error } = await _supabase.storage.from('media').upload(fileName, file);
            if(error) return null;
            return SB_URL + "/storage/v1/object/public/media/" + fileName;
        }

        async function addPlayer() {
            const imgUrl = await uploadFile(document.getElementById('p-img'));
            const p = {
                name: document.getElementById('p-name').value,
                user: document.getElementById('p-user').value,
                num: document.getElementById('p-num').value,
                pos: document.getElementById('p-pos').value,
                img: imgUrl
            };
            const { error } = await _supabase.from('players').insert(p);
            if(!error) { alert("تم الحفظ!"); loadData(); }
        }
    </script>
</body>
</html>
