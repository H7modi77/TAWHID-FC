<!DOCTYPE html>
<html id="html-tag" lang="ar" dir="rtl" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAWHID CLUB | LUXURY V13</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #00d2ff; --gold: #ffd700; --silver: #e2e8f0; --bronze: #cd7f32;
            --bg: #05070a; --card: #0d121a; --text: #ffffff; --border: #1a222c;
        }
        .light {
            --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --border: #e2e8f0; --primary: #2563eb;
        }
        body {
            background-color: var(--bg); color: var(--text); font-family: 'Cairo', sans-serif;
            transition: all 0.3s ease; overflow-x: hidden;
        }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        
        /* 3D Pitch - The Masterpiece */
        .pitch-container {
            perspective: 1000px; padding: 20px;
        }
        .pitch-3d {
            width: 100%; max-width: 400px; height: 500px; background: linear-gradient(to bottom, #14532d, #166534);
            margin: auto; transform: rotateX(25deg); border: 4px solid rgba(255,255,255,0.2);
            border-radius: 10px; position: relative; box-shadow: 0 50px 100px rgba(0,0,0,0.5);
            background-image: 
                linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 50px 50px;
        }
        .pitch-line {
            position: absolute; top: 50%; width: 100%; height: 2px; background: rgba(255,255,255,0.2);
        }
        .pitch-circle {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 100px; height: 100px; border: 2px solid rgba(255,255,255,0.2); border-radius: 50%;
        }

        /* Month Selector - Elegant */
        .month-pill {
            padding: 8px 20px; border-radius: 99px; cursor: pointer; white-space: nowrap;
            transition: 0.3s; border: 1px solid var(--border); font-size: 12px; font-weight: bold;
        }
        .month-pill.active {
            background: var(--primary); color: #000; border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary);
        }

        /* Glowing Sponsors */
        .sponsor-glow {
            position: relative; overflow: hidden;
        }
        .sponsor-glow::after {
            content: ''; position: absolute; inset: 0; background: radial-gradient(circle, var(--primary) 0%, transparent 70%);
            opacity: 0.15; filter: blur(20px); z-index: -1;
        }

        /* Royal Ranking Glows */
        .rank-gold { box-shadow: 0 0 30px rgba(255, 215, 0, 0.2); border: 1px solid var(--gold); }
        .rank-gold h4 { color: var(--gold); }
        .rank-silver { box-shadow: 0 0 30px rgba(226, 232, 240, 0.2); border: 1px solid var(--silver); }
        .rank-bronze { box-shadow: 0 0 30px rgba(205, 127, 50, 0.2); border: 1px solid var(--bronze); }

        /* News Zoom */
        .zoom-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 3000;
            display: none; align-items: center; justify-content: center; padding: 20px;
        }

        /* Sidebar & Navigation */
        .nav-fixed { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); border-top: 1px solid var(--border); z-index: 100; }

        .font-s { font-size: 14px; }
        .font-m { font-size: 18px; }
        .font-l { font-size: 22px; }
    </style>
</head>
<body class="font-m">

    <!-- News Zoom Modal -->
    <div id="zoom-modal" class="zoom-overlay" onclick="this.style.display='none'">
        <div class="relative max-w-4xl w-full text-center">
            <button class="absolute -top-12 right-0 text-white orbitron flex items-center gap-2">CLOSE <i data-lucide="x-circle"></i></button>
            <img id="zoom-img" src="" class="w-full rounded-3xl shadow-2xl">
            <p id="zoom-text" class="mt-6 text-xl font-bold leading-relaxed"></p>
        </div>
    </div>

    <!-- Main Content -->
    <div class="p-5 pb-32 max-w-5xl mx-auto">
        
        <!-- Header & Settings Icon -->
        <div class="flex justify-between items-center mb-8">
            <div>
                <img src="logo.png" class="w-12 mb-2" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1165/1165187.png'">
                <h1 class="orbitron font-black text-2xl tracking-tighter">TAWHID <span class="text-blue-500">CLUB</span></h1>
            </div>
            <button onclick="showSec('settings')" class="p-3 bg-gray-900/50 rounded-full border border-gray-800"><i data-lucide="settings"></i></button>
        </div>

        <!-- Month Selector (Luxury Tabs) -->
        <div class="flex gap-3 overflow-x-auto pb-4 no-scrollbar mb-8" id="month-tabs">
            <!-- JS Inject -->
        </div>

        <!-- Sections -->
        
        <!-- 1. Home / News -->
        <div id="sec-home" class="section">
            <div class="grid grid-cols-1 gap-6" id="news-container">
                <!-- News JS -->
            </div>
        </div>

        <!-- 2. Statistics (All Stats) -->
        <div id="sec-stats" class="section hidden">
            <div class="bg-[#0d121a] rounded-3xl border border-gray-800 overflow-hidden shadow-2xl">
                <div class="overflow-x-auto">
                    <table class="w-full text-center text-xs">
                        <thead class="bg-gray-900/80 text-gray-500 uppercase orbitron">
                            <tr>
                                <th class="p-4">Player</th><th class="p-4">Matches</th><th class="p-4">G</th><th class="p-4">A</th><th class="p-4">CS</th><th class="p-4">P%</th><th class="p-4">S%</th><th class="p-4 text-blue-500">AI</th>
                            </tr>
                        </thead>
                        <tbody id="stats-body" class="divide-y divide-gray-800/50"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- 3. Lineup (3D Pitch) -->
        <div id="sec-pitch" class="section hidden">
            <div class="pitch-container">
                <div class="pitch-3d">
                    <div class="pitch-line"></div>
                    <div class="pitch-circle"></div>
                    <div id="pitch-players"></div>
                </div>
            </div>
        </div>

        <!-- 4. Rankings (Luxury Glow) -->
        <div id="sec-rank" class="section hidden space-y-4" id="rank-list"></div>

        <!-- 5. Awards (POTM / GOTM) -->
        <div id="sec-awards" class="section hidden space-y-8">
            <div class="text-center p-8 bg-gradient-to-b from-yellow-500/10 to-transparent rounded-3xl border border-yellow-500/20">
                <h3 class="orbitron text-yellow-500 font-bold mb-4">PLAYER OF THE MONTH</h3>
                <img id="potm-img" src="" class="w-40 h-40 mx-auto rounded-full border-4 border-yellow-500 shadow-2xl mb-4">
                <h2 id="potm-name" class="text-3xl font-black orbitron"></h2>
            </div>
            <div class="p-6 bg-gray-900/50 rounded-3xl border border-blue-500/20">
                <h3 class="orbitron text-blue-500 font-bold mb-4 text-center">GOAL OF THE MONTH</h3>
                <div class="aspect-video bg-black rounded-2xl overflow-hidden border-2 border-gray-800">
                    <video id="gotm-video" controls class="w-full h-full">
                        <source src="https://raw.githubusercontent.com/H7modi77/TAWHID-FC/main/19c9ebcbc1934-master_playlist.mov">
                    </video>
                </div>
            </div>
        </div>

        <!-- 6. Settings -->
        <div id="sec-settings" class="section hidden">
            <div class="bg-[#0d121a] p-8 rounded-3xl border border-gray-800 space-y-8">
                <div>
                    <label class="block text-gray-500 mb-4 orbitron uppercase text-xs">Language</label>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="setLang('ar')" class="p-3 bg-gray-800 rounded-xl">العربية</button>
                        <button onclick="setLang('en')" class="p-3 bg-gray-800 rounded-xl">English</button>
                        <button onclick="setLang('fr')" class="p-3 bg-gray-800 rounded-xl">Français</button>
                        <button onclick="setLang('cn')" class="p-3 bg-gray-800 rounded-xl">中文</button>
                    </div>
                </div>
                <div>
                    <label class="block text-gray-500 mb-4 orbitron uppercase text-xs">Theme Mode</label>
                    <button onclick="toggleTheme()" class="w-full p-4 bg-blue-600 rounded-xl font-bold flex items-center justify-center gap-2">
                        <i data-lucide="sun"></i> Toggle Day / Night
                    </button>
                </div>
                <div>
                    <label class="block text-gray-500 mb-4 orbitron uppercase text-xs">Font Size</label>
                    <div class="flex gap-2">
                        <button onclick="setFont('s')" class="flex-1 p-3 bg-gray-800 rounded-xl">Small</button>
                        <button onclick="setFont('m')" class="flex-1 p-3 bg-gray-800 rounded-xl">Medium</button>
                        <button onclick="setFont('l')" class="flex-1 p-3 bg-gray-800 rounded-xl">Large</button>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- Navigation Bar (Mobile Nav) -->
    <div class="nav-fixed flex justify-around p-4 shadow-2xl">
        <button onclick="showSec('home')" class="nav-icon text-blue-500"><i data-lucide="home"></i></button>
        <button onclick="showSec('stats')" class="nav-icon text-gray-500"><i data-lucide="bar-chart-3"></i></button>
        <button onclick="showSec('pitch')" class="nav-icon text-gray-500"><i data-lucide="shield"></i></button>
        <button onclick="showSec('rank')" class="nav-icon text-gray-500"><i data-lucide="trophy"></i></button>
        <button onclick="showSec('awards')" class="nav-icon text-gray-500"><i data-lucide="award"></i></button>
    </div>

    <!-- Luxury Sponsors -->
    <div class="fixed bottom-20 left-0 right-0 flex justify-center gap-10 sponsor-glow pb-4">
        <img src="sponsor1.png" class="h-6 opacity-60" onerror="this.src='https://upload.wikimedia.org/wikipedia/en/thumb/4/43/EA_Sports_FC_logo.svg/1200px-EA_Sports_FC_logo.svg.png'">
        <img src="sponsor2.png" class="h-6 opacity-60" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/thumb/a/ad/Adidas_Logo.svg/1200px-Adidas_Logo.svg.png'">
    </div>

    <script>
        const TRANSLATIONS = {
            ar: { home: "الرئيسية", stats: "الإحصائيات", rank: "الترتيب", lineup: "التشكيلة", awards: "الجوائز", news_title: "أخبار النادي العاجلة" },
            en: { home: "Home", stats: "Statistics", rank: "Ranking", lineup: "Lineup", awards: "Awards", news_title: "Club Breaking News" },
            fr: { home: "Accueil", stats: "Statistiques", rank: "Classement", lineup: "Formation", awards: "Prix", news_title: "Nouvelles du Club" },
            cn: { home: "首页", stats: "数据", rank: "排名", lineup: "阵容", awards: "奖项", news_title: "俱乐部新闻" }
        };

        const players = [
            { name: "Almousa3M", pos: "Attack", photo: "almousa3m.png", pitch: { t: '20%', l: '35%' }, stats: {
                October: { m: 58, g: 65, a: 61, cs: 0, p: 78, s: 33, w: 60 },
                November: { m: 57, g: 67, a: 72, cs: 0, p: 77, s: 33, w: 53 },
                January: { m: 126, g: 161, a: 146, cs: 0, p: 77, s: 40, w: 49 },
                February: { m: 42, g: 48, a: 41, cs: 0, p: 77, s: 39, w: 49 }
            }},
            { name: "H7modi77", pos: "Attack", photo: "h7modi77.png", pitch: { t: '35%', l: '20%' }, stats: {
                October: { m: 45, g: 14, a: 36, cs: 0, p: 79, s: 37, w: 62 },
                February: { m: 44, g: 20, a: 26, cs: 0, p: 75, s: 37, w: 47 }
            }},
            { name: "M---_11_11", pos: "Midfield", photo: "m1111.png", pitch: { t: '60%', l: '50%' }, stats: {
                February: { m: 40, g: 24, a: 19, cs: 2, p: 75, s: 34, w: 46 }
            }},
            { name: "Basabeso2", pos: "Defender", photo: "basabeso2.png", pitch: { t: '85%', l: '50%' }, stats: {
                February: { m: 24, g: 2, a: 3, cs: 4, p: 85, s: 0, w: 50 }
            }}
        ];

        let currentLang = 'ar';
        let currentMonth = 'February';

        // Advanced AI Logic
        function calcAI(d, pos) {
            if (!d || d.m === 0) return 0;
            let score = 0;
            if (pos === "Attack") score = (d.g * 3.5) + (d.a * 2.5) + (d.s * 0.5) + (d.p * 0.2);
            if (pos === "Midfield") score = (d.g * 2.0) + (d.a * 3.5) + (d.p * 1.5) + (d.w * 0.5);
            if (pos === "Defender") score = (d.cs * 8.0) + (d.p * 1.2) + (d.w * 2.0) + (d.g * 1.5);
            return (score / 10 + 30).toFixed(1);
        }

        function showSec(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.add('hidden'));
            document.getElementById('sec-' + id).classList.remove('hidden');
            document.querySelectorAll('.nav-icon').forEach(i => i.classList.replace('text-blue-500', 'text-gray-500'));
            event.currentTarget.classList.replace('text-gray-500', 'text-blue-500');
        }

        function toggleTheme() { document.getElementById('html-tag').classList.toggle('dark'); }
        function setFont(sz) { document.body.className = 'font-' + sz; }
        function setLang(l) { 
            currentLang = l; 
            document.documentElement.dir = (l === 'ar') ? 'rtl' : 'ltr';
            renderAll(); 
        }

        function zoom(img, text) {
            document.getElementById('zoom-img').src = img;
            document.getElementById('zoom-text').innerText = text;
            document.getElementById('zoom-modal').style.display = 'flex';
        }

        function renderAll() {
            const period = currentMonth;
            const statsBody = document.getElementById('stats-body');
            const pitchPlayers = document.getElementById('pitch-players');
            const rankList = document.getElementById('rank-list');
            const monthTabs = document.getElementById('month-tabs');
            const newsCont = document.getElementById('news-container');

            statsBody.innerHTML = ''; pitchPlayers.innerHTML = ''; rankList.innerHTML = ''; newsCont.innerHTML = '';

            // Months Tabs
            const months = ["February", "January", "November", "October"];
            monthTabs.innerHTML = months.map(m => `
                <div class="month-pill ${currentMonth === m ? 'active' : ''}" onclick="currentMonth='${m}'; renderAll()">${m}</div>
            `).join('');

            // News
            const news = [
                { img: "news1.png", ar: "اجتماع طارئ لمناقشة التكتيكات الجديدة للموسم القادم بحضور جميع اللاعبين.", en: "Emergency meeting to discuss new tactics for the next season with all players." },
                { img: "news2.png", ar: "مقابلة حصرية مع نجم الفريق Almousa3M حول طموحات النادي في الوصول للعالمية.", en: "Exclusive interview with star player Almousa3M about global ambitions." }
            ];
            newsCont.innerHTML = news.map(n => `
                <div class="bg-gray-900/50 rounded-3xl p-4 border border-gray-800" onclick="zoom('${n.img}', '${n[currentLang]}')">
                    <img src="${n.img}" class="w-full h-48 object-cover rounded-2xl mb-4 grayscale hover:grayscale-0 transition cursor-zoom-in" onerror="this.src='https://via.placeholder.com/400x200/000/fff?text=NEWS'">
                    <p class="font-bold leading-relaxed">${n[currentLang]}</p>
                </div>
            `).join('');

            // Processing Players
            let data = players.map(p => {
                let d = p.stats[period] || { m:0, g:0, a:0, cs:0, p:0, s:0, w:0 };
                return { ...p, cur: d, ai: parseFloat(calcAI(d, p.pos)) };
            }).sort((a,b) => b.ai - a.ai);

            data.forEach((p, i) => {
                // Stats Table
                statsBody.innerHTML += `
                    <tr>
                        <td class="p-4 font-bold text-blue-500">${p.name}</td>
                        <td class="orbitron">${p.cur.m}</td><td class="orbitron">${p.cur.g}</td>
                        <td class="orbitron">${p.cur.a}</td><td class="orbitron">${p.cur.cs}</td>
                        <td class="orbitron text-gray-500">${p.cur.p}%</td><td class="orbitron text-gray-500">${p.cur.s}%</td>
                        <td class="p-4 orbitron font-bold text-lg">${p.ai}</td>
                    </tr>`;

                // Rank List
                let glow = (i === 0) ? 'rank-gold' : (i === 1) ? 'rank-silver' : (i === 2) ? 'rank-bronze' : '';
                rankList.innerHTML += `
                    <div class="bg-gray-900/80 p-4 rounded-2xl flex items-center justify-between ${glow}">
                        <div class="flex items-center gap-4">
                            <span class="orbitron font-black text-xl text-gray-700">#${i+1}</span>
                            <img src="${p.photo}" class="w-12 h-12 rounded-xl border border-gray-700" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2102/2102647.png'">
                            <div><h4 class="font-black orbitron uppercase">${p.name}</h4><p class="text-[10px] text-gray-500 uppercase">${p.pos}</p></div>
                        </div>
                        <div class="text-2xl font-black orbitron text-blue-500">${p.ai}</div>
                    </div>`;

                // Pitch
                pitchPlayers.innerHTML += `
                    <div class="absolute" style="top:${p.pitch.t}; left:${p.pitch.l}; transform:translate(-50%, -50%)">
                        <div class="relative">
                            <img src="${p.photo}" class="w-10 h-10 rounded-full border-2 border-white/50 bg-black" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2102/2102647.png'">
                            <span class="absolute -bottom-4 left-1/2 -translate-x-1/2 bg-black/80 px-2 py-0.5 rounded text-[8px] orbitron">${p.name}</span>
                        </div>
                    </div>`;
            });

            // Awards (POTM) - Top of the month
            const potm = data[0];
            document.getElementById('potm-img').src = potm.photo;
            document.getElementById('potm-name').innerText = potm.name;

            lucide.createIcons();
        }

        window.onload = renderAll;
    </script>
</body>
</html>
