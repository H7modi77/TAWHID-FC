<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>نادي التوحيد</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="hero">
<img src="images/logo.png" class="logo">
<h1>TAWHID CLUB</h1>
<p>Ultimate Team System</p>
</header>

<nav>
<button onclick="show('home')">الرئيسية</button>
<button onclick="show('team')">اللاعبين</button>
<button onclick="show('awards')">الجوائز</button>
<button onclick="show('admin')">Admin</button>
</nav>

<!-- HOME -->
<section id="home" class="section active">
<h2>مرحبا في نادي التوحيد</h2>
<p>نظام إحصائيات ذكي مثل FIFA Ultimate Team</p>
</section>

<!-- TEAM -->
<section id="team" class="section">
<h2>الفريق</h2>
<div id="playersContainer" class="grid"></div>
</section>

<!-- AWARDS -->
<section id="awards" class="section">
<h2>جوائز الشهر</h2>
<div id="awardsBox"></div>
</section>

<!-- ADMIN -->
<section id="admin" class="section">
<h2>تسجيل دخول الأدمن</h2>

<input id="user" placeholder="User">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>

<div id="panel" style="display:none">
<h3>إضافة لاعب</h3>

<input id="pname" placeholder="اسم اللاعب">
<input id="pphoto" placeholder="اسم الصورة">
<input id="ppos" placeholder="المركز">

<button onclick="addPlayer()">إضافة</button>
</div>
</section>

<!-- PLAYER MODAL -->
<div id="modal" class="modal">
<div class="modalBox" id="modalContent"></div>
</div>

<script src="app.js"></script>
</body>
</html>
