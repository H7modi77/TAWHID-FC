<!DOCTYPE html>
<html id="html-tag" lang="ar" dir="rtl" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAWHID CLUB | LUXURY PORTAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #00d2ff; --gold: #ffd700; --silver: #e2e8f0; --bronze: #cd7f32;
            --bg: #05070a; --card: #0d121a; --text: #ffffff; --border: #1a222c;
        }
        .light {
            --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --border: #e2e8f0; --primary: #2563eb;
        }
        body { background-color: var(--bg); color: var(--text); transition: 0.3s; overflow-x: hidden; font-family: 'Cairo', sans-serif; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        
        /* 3D Pitch - Masterwork */
        .pitch-container { perspective: 1200px; padding: 20px; margin-top: -40px; }
        .pitch-3d {
            width: 100%; max-width: 400px; height: 580px; background: linear-gradient(to bottom, #14532d, #166534);
            margin: auto; transform: rotateX(30deg); border: 4px solid rgba(255,255,255,0.2);
            border-radius: 15px; position: relative; box-shadow: 0 50px 100px rgba(0,0,0,0.7);
            background-image: repeating-linear-gradient(0deg, transparent, transparent 50px, rgba(255,255,255,0.02) 50px, rgba(255,255,255,0.02) 100px);
        }
        .pitch-line { position: absolute; top: 50%; width: 100%; height: 2px; background: rgba(255,255,255,0.2); }
        .pitch-circle { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100px; height: 100px; border: 2px solid rgba(255,255,255,0.2); border-radius: 50%; }

        /* Luxury Tabs */
        .month-pill { padding: 8px 18px; border-radius: 99px; cursor: pointer; border: 1px solid var(--border); font-size: 11px; font-weight: bold; white-space: nowrap; transition: 0.3s; background: var(--card); }
        .month-pill.active { background: var(--primary); color: #000; border-color: var(--primary); box-shadow: 0 0 20px var(--primary); }

        /* Royal Ranking */
        .rank-gold { border: 2px solid var(--gold) !important; box-shadow: 0 0 30px rgba(255,215,0,0.2); }
        .rank-gold h4 { color: var(--gold); }
        .rank-silver { border: 2px solid var(--silver) !important; box-shadow: 0 0 30px rgba(226,232,240,0.2); }
        .rank-bronze { border: 2px solid var(--bronze) !important; box-shadow: 0 0 30px rgba(205,127,50,0.2); }

        /* Bottom Nav */
        .nav-fixed { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); border-top: 1px solid var(--border); z-index: 1000; backdrop-filter: blur(15px); }
        
        /* Font Sizes */
        .f-s { font-size: 13px; } .f-m { font-size: 16px; } .f-l { font-size: 20px; }

        .sponsor-box { position: relative; z-index: 1; }
        .sponsor-box::before { content: ''; position: absolute; inset: -10px; background: var(--primary); filter: blur(30px); opacity: 0.1; z-index: -1; }
        
        .zoom-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 3000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="f-m">

    <!-- News Zoom -->
    <div id="zoom-modal" class="zoom-overlay" onclick="this.style.display='none'">
        <div class="relative max-w-2xl w-full text-center">
            <button class="absolute -top-12 right-0 text-white orbitron flex items-center gap-2">CLOSE <i data-lucide="x-circle"></i></button>
            <img id="zoom-img" src="" class="w-full rounded-3xl border border-gray-800">
            <p id="zoom-text" class="mt-6 text-lg font-bold text-blue-400"></p>
        </div>
    </div>

    <!-- Main View -->
    <div class="p-4 pb-28 max-w-4xl mx-auto">
        
        <!-- Header -->
        <div class="flex justify-between items-center mb-6">
            <div class="flex items-center gap-3">
                <img src="logo.png" class="w-10" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1165/1165187.png'">
                <h1 class="orbitron font-black text-xl tracking-tighter uppercase">Tawhid <span class="text-blue-500">Club</span></h1>
            </div>
            <button onclick="showSec('settings')" class="p-2.5 bg-gray-900/50 rounded-full border border-gray-800"><i data-lucide="settings" class="w-5 h-5"></i></button>
        </div>

        <!-- Luxury Month Selector -->
        <div class="flex gap-2 overflow-x-auto pb-4 no-scrollbar mb-6" id="month-tabs"></div>

        <!-- Sections -->
        
        <!-- News Section -->
        <div id="sec-home" class="section space-y-4">
            <div id="news-container" class="grid grid-cols-1 gap-4"></div>
        </div>

        <!-- All Stats Section -->
        <div id="sec-stats" class="section hidden">
            <div class="bg-[#0d121a] rounded-2xl border border-gray-800 overflow-hidden shadow-2xl">
                <div class="overflow-x-auto">
                    <table class="w-full text-center text-[10px] md:text-xs">
                        <thead class="bg-gray-900/80 text-gray-500 uppercase orbitron">
                            <tr>
                                <th class="p-3">Player</th><th class="p-3">M</th><th class="p-3">G</th><th class="p-3">A</th><th class="p-3">CS</th><th class="p-3">P%</th><th class="p-3">W%</th><th class="p-3 text-blue-500">AI</th>
                            </tr>
                        </thead>
                        <tbody id="stats-body" class="divide-y divide-gray-800/30"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- 3D Lineup Section -->
        <div id="sec-pitch" class="section hidden">
            <div class="pitch-container">
                <div class="pitch-3d">
                    <div class="pitch-line"></div>
                    <div class="pitch-circle"></div>
                    <div id="pitch-players"></div>
                </div>
            </div>
        </div>

        <!-- Ranking Section -->
        <div id="sec-rank" class="section hidden space-y-3" id="rank-list"></div>

        <!-- Awards Section -->
        <div id="sec-awards" class="section hidden space-y-6">
            <div class="text-center p-6 bg-gradient-to-b from-yellow-500/10 to-transparent rounded-3xl border border-yellow-500/20">
                <h3 class="orbitron text-yellow-500 text-xs font-bold mb-4 uppercase tracking-widest">Player Of The Month</h3>
                <img id="potm-img" src="" class="w-32 h-32 mx-auto rounded-full border-4 border-yellow-500 shadow-2xl mb-4 bg-black">
                <h2 id="potm-name" class="text-2xl font-black orbitron text-white"></h2>
            </div>
            <div class="p-4 bg-gray-900/50 rounded-3xl border border-blue-500/20">
                <h3 class="orbitron text-blue-500 text-xs font-bold mb-4 text-center uppercase tracking-widest">Goal Of The Month</h3>
                <div class="aspect-video bg-black rounded-2xl overflow-hidden border-2 border-gray-800">
                    <video controls class="w-full h-full">
                        <source src="https://raw.githubusercontent.com/H7modi77/TAWHID-FC/main/19c9ebcbc1934-master_playlist.mov">
                    </video>
                </div>
            </div>
        </div>

        <!-- Settings Section -->
        <div id="sec-settings" class="section hidden space-y-6">
            <div class="bg-[#0d121a] p-6 rounded-3xl border border-gray-800 space-y-6">
                <div>
                    <label class="block text-gray-500 mb-3 orbitron uppercase text-[10px]">Select Language</label>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="setL('ar')" class="p-3 bg-gray-800 rounded-xl text-xs">العربية</button>
                        <button onclick="setL('en')" class="p-3 bg-gray-800 rounded-xl text-xs">English</button>
                        <button onclick="setL('fr')" class="p-3 bg-gray-800 rounded-xl text-xs">Français</button>
                        <button onclick="setL('cn')" class="p-3 bg-gray-800 rounded-xl text-xs">中文</button>
                    </div>
                </div>
                <div>
                    <label class="block text-gray-500 mb-3 orbitron uppercase text-[10px]">Display Mode</label>
                    <button onclick="toggleT()" class="w-full p-4 bg-blue-600 rounded-xl font-bold flex items-center justify-center gap-2 uppercase text-xs">
                        <i data-lucide="sun" class="w-4 h-4"></i> Switch Theme
                    </button>
                </div>
                <div>
                    <label class="block text-gray-500 mb-3 orbitron uppercase text-[10px]">Font Scale</label>
                    <div class="flex gap-2">
                        <button onclick="setF('s')" class="flex-1 p-3 bg-gray-800 rounded-xl text-xs">Small</button>
                        <button onclick="setF('m')" class="flex-1 p-3 bg-gray-800 rounded-xl text-xs">Medium</button>
                        <button onclick="setF('l')" class="flex-1 p-3 bg-gray-800 rounded-xl text-xs">Large</button>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- Navigation -->
    <div class="nav-fixed flex justify-around p-4 shadow-2xl">
        <button onclick="showSec('home')" class="nav-ico text-blue-500"><i data-lucide="home"></i></button>
        <button onclick="showSec('stats')" class="nav-ico text-gray-500"><i data-lucide="bar-chart-3"></i></button>
        <button onclick="showSec('pitch')" class="nav-ico text-gray-500"><i data-lucide="layout"></i></button>
        <button onclick="showSec('rank')" class="nav-ico text-gray-500"><i data-lucide="trophy"></i></button>
        <button onclick="showSec('awards')" class="nav-ico text-gray-500"><i data-lucide="award"></i></button>
    </div>

    <!-- Glowing Sponsors -->
    <div class="fixed bottom-20 left-0 right-0 flex justify-center gap-10 opacity-40 sponsor-box">
        <img src="sponsor1.png" class="h-6" onerror="this.src='https://upload.wikimedia.org/wikipedia/en/thumb/4/43/EA_Sports_FC_logo.svg/1200px-EA_Sports_FC_logo.svg.png'">
        <img src="sponsor2.png" class="h-6" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/thumb/a/ad/Adidas_Logo.svg/1200px-Adidas_Logo.svg.png'">
    </div>

    <script>
        const players = [
            { name: "Almousa3M", pos: "Attack", photo: "almousa3m.png", coords: { t: '15%', l: '35%' }, stats: {
                October: { m: 58, g: 65, a: 61, cs: 0, p: 78, w: 60, s: 33 },
                November: { m: 57, g: 67, a: 72, cs: 0, p: 77, w: 53, s: 33 },
                January: { m: 126, g: 161, a: 146, cs: 0, p: 77, w: 49, s: 40 },
                February: { m: 42, g: 48, a: 41, cs: 0, p: 77, w: 49, s: 39 }
            }},
            { name: "H2ssain_28", pos: "Attack", photo: "h2ssain28.png", coords: { t: '15%', l: '65%' }, stats: {
                October: { m: 44, g: 36, a: 15, cs: 0, p: 76, w: 56, s: 23 },
                November: { m: 64, g: 59, a: 48, cs: 0, p: 77, w: 51, s: 25 },
                January: { m: 146, g: 144, a: 72, cs: 0, p: 73, w: 44, s: 28 },
                February: { m: 31, g: 31, a: 55, cs: 0, p: 73, w: 44, s: 28 }
            }},
            { name: "H7modi77", pos: "Attack", photo: "h7modi77.png", coords: { t: '35%', l: '20%' }, stats: {
                October: { m: 45, g: 14, a: 36, cs: 0, p: 79, w: 62, s: 37 },
                November: { m: 77, g: 52, a: 54, cs: 0, p: 76, w: 51, s: 40 },
                January: { m: 116, g: 44, a: 85, cs: 0, p: 75, w: 47, s: 39 },
                February: { m: 44, g: 20, a: 26, cs: 0, p: 75, w: 47, s: 37 }
            }},
            { name: "Yo0ousef25", pos: "Attack", photo: "yo0ousef25.png", coords: { t: '35%', l: '80%' }, stats: {
                October: { m: 28, g: 23, a: 5, cs: 0, p: 78, w: 67, s: 46 },
                November: { m: 26, g: 21, a: 8, cs: 0, p: 78, w: 58, s: 52 },
                January: { m: 99, g: 57, a: 17, cs: 0, p: 74, w: 43, s: 47 },
                February: { m: 18, g: 11, a: 2, cs: 0, p: 74, w: 43, s: 47 }
            }},
            { name: "M---_11_11", pos: "Midfield", photo: "m1111.png", coords: { t: '60%', l: '50%' }, stats: {
                October: { m: 68, g: 38, a: 43, cs: 2, p: 81, w: 57, s: 27 },
                November: { m: 86, g: 48, a: 58, cs: 3, p: 74, w: 54, s: 29 },
                January: { m: 158, g: 112, a: 113, cs: 5, p: 75, w: 46, s: 33 },
                February: { m: 40, g: 24, a: 19, cs: 2, p: 75, w: 46, s: 34 }
            }},
            { name: "Basabeso2", pos: "Defender", photo: "basabeso2.png", coords: { t: '85%', l: '50%' }, stats: {
                February: { m: 24, g: 2, a: 3, cs: 4, p: 85, w: 50, s: 0 }
            }}
        ];

        let curMonth = 'February';
        let curLang = 'ar';

        function calcAI(d, pos) {
            if (!d || d.m === 0) return 0;
            let score = 0;
            if (pos === "Attack") score = (d.g * 4.0) + (d.a * 2.5) + (d.s * 0.6) + (d.p * 0.2);
            if (pos === "Midfield") score = (d.g * 2.0) + (d.a * 4.0) + (d.p * 1.5) + (d.w * 0.5);
            if (pos === "Defender") score = (d.cs * 10.0) + (d.w * 2.5) + (d.p * 1.0) + (d.g * 2.0);
            return (score / 10 + 30).toFixed(1);
        }

        function getStats(p, month) {
            if (month === "TOTAL") {
                let t = { m: 0, g: 0, a: 0, cs: 0, p: 0, w: 0, s: 0, count: 0 };
                for (let m in p.stats) {
                    let d = p.stats[m];
                    t.m += d.m; t.g += d.g; t.a += d.a; t.cs += d.cs;
                    t.p += d.p; t.w += d.w; t.s += d.s; t.count++;
                }
                return { m: t.m, g: t.g, a: t.a, cs: t.cs, p: Math.round(t.p/t.count), w: Math.round(t.w/t.count), s: Math.round(t.s/t.count) };
            }
            return p.stats[month] || { m:0, g:0, a:0, cs:0, p:0, w:0, s:0 };
        }

        function showSec(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.add('hidden'));
            document.getElementById('sec-' + id).classList.remove('hidden');
            document.querySelectorAll('.nav-ico').forEach(i => i.classList.replace('text-blue-500', 'text-gray-500'));
            event.currentTarget.classList.replace('text-gray-500', 'text-blue-500');
        }

        function setL(l) { curLang = l; document.documentElement.dir = l==='ar'?'rtl':'ltr'; render(); }
        function toggleT() { document.getElementById('html-tag').classList.toggle('dark'); }
        function setF(s) { document.body.className = 'f-' + s; }

        function zoom(img, text) {
            document.getElementById('zoom-img').src = img;
            document.getElementById('zoom-text').innerText = text;
            document.getElementById('zoom-modal').style.display = 'flex';
        }

        function render() {
            const period = curMonth;
            const statsBody = document.getElementById('stats-body');
            const pitch = document.getElementById('pitch-players');
            const rank = document.getElementById('rank-list');
            const tabs = document.getElementById('month-tabs');
            const newsCont = document.getElementById('news-container');

            statsBody.innerHTML = ''; pitch.innerHTML = ''; rank.innerHTML = ''; tabs.innerHTML = ''; newsCont.innerHTML = '';

            // Tabs
            const mList = ["TOTAL", "February", "January", "November", "October"];
            tabs.innerHTML = mList.map(m => `<div class="month-pill ${curMonth === m ? 'active' : ''}" onclick="curMonth='${m}'; render()">${m}</div>`).join('');

            // News
            const news = [
                { img: "news1.png", ar: "اجتماع الأعضاء لمناقشة تكتيكات الموسم الجديد.", en: "Board meeting to discuss new season tactics." },
                { img: "news2.png", ar: "لقاء حصري مع المهاجم Almousa3M حول طموحات الفريق.", en: "Exclusive interview with Almousa3M about ambitions." }
            ];
            newsCont.innerHTML = news.map(n => `
                <div class="bg-gray-900/40 p-3 rounded-2xl border border-gray-800 flex items-center gap-4" onclick="zoom('${n.img}', '${n[curLang]}')">
                    <img src="${n.img}" class="w-20 h-20 object-cover rounded-xl opacity-60" onerror="this.src='https://via.placeholder.com/100'">
                    <p class="text-sm font-bold">${n[curLang]}</p>
                </div>
            `).join('');

            // Players
            let data = players.map(p => {
                let d = getStats(p, period);
                return { ...p, cur: d, ai: parseFloat(calcAI(d, p.pos)) };
            }).sort((a,b) => b.ai - a.ai);

            data.forEach((p, i) => {
                // Table
                statsBody.innerHTML += `<tr><td class="p-3 font-bold text-blue-500 uppercase">${p.name}</td><td class="orbitron">${p.cur.m}</td><td class="orbitron">${p.cur.g}</td><td class="orbitron">${p.cur.a}</td><td class="orbitron">${p.cur.cs}</td><td class="orbitron">${p.cur.p}%</td><td class="orbitron">${p.cur.w}%</td><td class="p-3 orbitron font-bold text-blue-500">${p.ai}</td></tr>`;
                
                // Rank
                let glow = i===0?'rank-gold':i===1?'rank-silver':i===2?'rank-bronze':'';
                rank.innerHTML += `
                    <div class="bg-gray-900/60 p-4 rounded-2xl flex items-center justify-between border border-gray-800 ${glow}">
                        <div class="flex items-center gap-4">
                            <span class="orbitron font-black text-xl text-gray-700">#${i+1}</span>
                            <img src="${p.photo}" class="w-12 h-12 rounded-xl bg-black" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2102/2102647.png'">
                            <div><h4 class="font-black orbitron uppercase text-sm">${p.name}</h4><p class="text-[9px] text-gray-500 uppercase">${p.pos}</p></div>
                        </div>
                        <div class="text-2xl font-black orbitron text-blue-500">${p.ai}</div>
                    </div>`;

                // Pitch
                pitch.innerHTML += `
                    <div class="absolute" style="top:${p.coords.t}; left:${p.coords.l}; transform:translate(-50%, -50%)">
                        <img src="${p.photo}" class="w-10 h-10 rounded-full border-2 border-white/40 bg-black" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2102/2102647.png'">
                        <span class="block text-center text-[8px] orbitron mt-1 bg-black/70 px-1 rounded">${p.name}</span>
                    </div>`;
            });

            // POTM
            const potm = data[0];
            document.getElementById('potm-img').src = potm.photo;
            document.getElementById('potm-name').innerText = potm.name;

            lucide.createIcons();
        }

        window.onload = render;
    </script>
</body>
</html>
