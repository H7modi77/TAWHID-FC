<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نادي التوحيد</title>
<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#0b0f1a;
    color:white;
    text-align:center;
    padding-bottom:70px;
}
body::before{
    content:"";
    position:fixed;
    width:200%;
    height:200%;
    background:linear-gradient(45deg,#001,#112,#001);
    animation:bg 20s linear infinite;
    z-index:-1;
}
@keyframes bg{100%{transform:translate(-50%,-50%)}} 
.hero{
    padding:40px;
    background:linear-gradient(90deg,#0ea5ff,#7c3aed);
}
.logo{width:80px;}
nav{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:8px;
    padding:10px;
}
nav button{
    background:#ffffff22;
    border:none;
    color:white;
    padding:10px;
    border-radius:10px;
    cursor:pointer;
}
.section{display:none;padding:15px;}
.active{display:block;}
.grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
}
.card{
    background:#ffffff11;
    backdrop-filter:blur(12px);
    border-radius:15px;
    padding:10px;
    cursor:pointer;
    position:relative;
}
.card img{
    width:100%;
    border-radius:12px;
}
.modal{
    display:none;
    position:fixed;
    top:0;
    width:100%;
    height:100%;
    background:#000a;
}
.modalBox{
    background:#111;
    margin:10% auto;
    width:90%;
    padding:20px;
    border-radius:15px;
}
table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
}
td,th{
    border:1px solid #ffffff22;
    padding:6px;
    font-size:12px;
}
.sponsors{
    position:fixed;
    bottom:0;
    width:100%;
    background:#000c;
    display:flex;
    justify-content:center;
    gap:20px;
    padding:8px;
}
.sponsors img{height:40px;}
video{width:100%;border-radius:10px;}
.newsCard img{width:100%;border-radius:10px;}
.newsDate{font-size:12px;opacity:.7;}
.likeBtn{cursor:pointer;color:#fff;margin-right:10px;}
.commentsBox{margin-top:5px;text-align:right;font-size:12px;}
.commentInput{width:80%;padding:5px;margin-top:5px;}
.rankingGold{border:2px solid gold;}
.rankingSilver{border:2px solid silver;}
.rankingBronze{border:2px solid #cd7f32;}
</style>
</head>
<body>

<header class="hero">
    <img src="logo.png" class="logo">
    <h1>نادي التوحيد</h1>
    <p>نظام الفريق الشامل</p>
</header>

<nav>
    <button onclick="show('home')">الرئيسية</button>
    <button onclick="show('team')">اللاعبين</button>
    <button onclick="show('awards')">الجوائز</button>
    <button onclick="show('stats')">الإحصائيات</button>
    <button onclick="show('ranking')">الترتيب</button>
    <button onclick="show('admin')">Admin</button>
</nav>

<section id="home" class="section active">
    <h2>آخر الأخبار</h2>
    <div id="newsBox" class="grid"></div>
</section>

<section id="team" class="section">
    <h2>الفريق</h2>
    <div id="playersContainer" class="grid"></div>
</section>

<section id="awards" class="section">
    <h2>جوائز الشهر</h2>
    <div id="awardsBox" class="grid"></div>
</section>

<section id="stats" class="section">
    <h2>إحصائيات اللاعبين</h2>
    <div id="statsBox"></div>
</section>

<section id="ranking" class="section">
    <h2>ترتيب اللاعبين</h2>
    <div id="rankingBox" class="grid"></div>
</section>

<section id="admin" class="section">
    <input id="user" placeholder="User">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <div id="panel" style="display:none">
        <input id="pname" placeholder="اسم اللاعب">
        <input id="pphoto" placeholder="رابط الصورة">
        <input id="ppos" placeholder="المركز">
        <button onclick="addPlayer()">إضافة لاعب</button>
    </div>
</section>

<div id="modal" class="modal">
    <div id="modalContent" class="modalBox"></div>
</div>

<footer class="sponsors">
    <img src="sponsor1.png">
    <img src="sponsor2.png">
</footer>

<script>
// SPA
function show(id){
    document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

// DATA
let players=[
    {name:"Basabeso2",photo:"basabeso2.png",pos:"Defender",likes:0,comments:[]},
    {name:"M---_11_11",photo:"m1111.png",pos:"Midfield",likes:0,comments:[]},
    {name:"H7modi77",photo:"h7modi77.png",pos:"Midfield/Attack",likes:0,comments:[]},
    {name:"Almousa3M",photo:"almousa3m.png",pos:"Attack",likes:0,comments:[]},
    {name:"H2ssain_28",photo:"h2ssain28.png",pos:"Attack",likes:0,comments:[]},
    {name:"Yo0ousef25",photo:"yo0ousef25.png",pos:"Attack",likes:0,comments:[]}
];

const stats={
// ... (نفس البيانات كما هي) 
};

// AI CALCULATION
function calcAI(d,pos){
    let ai=(d.g*2.1)+(d.a*2.1)+(d.p*1.5)+(d.w*1.5);
    if(pos=="Attack") ai+=d.s*2.5;
    if(pos=="Defender") ai+= (d.cs||0)*2.0;
    return Math.round(ai);
}

function totalStatsByPosition(name,pos){
    let months=stats[name];
    let t={m:0,g:0,a:0,p:0,s:0,w:0,cs:0,best:0};
    let c=0;
    for(let m in months){
        let d=months[m];
        t.m+=d.m; t.g+=d.g; t.a+=d.a; t.p+=d.p; t.s+=d.s||0; t.w+=d.w; t.cs+=d.cs||0; t.best+=d.best||0; c++;
    }
    t.p=Math.round(t.p/c); t.s=Math.round(t.s/c); t.w=Math.round(t.w/c); t.cs=Math.round(t.cs/c);
    return t;
}

// RENDER TEAM
function renderTeam(){
    playersContainer.innerHTML="";
    players.forEach(p=>{
        let pos = p.pos.includes("Defender")?"Defender":p.pos.includes("Midfield")?"Midfield":"Attack";
        let ai = calcAI(totalStatsByPosition(p.name,pos),pos);
        playersContainer.innerHTML+=`
        <div class="card" onclick="openPlayer('${p.name}')">
            <img src="${p.photo}">
            <h3>${p.name}</h3>
            <p>${p.pos}</p>
            <h2>AI ${ai}</h2>
            <div>
                <span class="likeBtn" onclick="likePlayer(event,'${p.name}')">❤️ ${p.likes}</span>
            </div>
            <div class="commentsBox">
                ${p.comments.map(c=>`<p>• ${c}</p>`).join('')}
                <input class="commentInput" placeholder="أضف تعليق" onkeydown="addComment(event,'${p.name}')">
            </div>
        </div>`;
    });
}
renderTeam();

// LIKE + COMMENT
function likePlayer(e,name){
    e.stopPropagation();
    let p = players.find(pl=>pl.name===name);
    p.likes++;
    renderTeam();
}
function addComment(e,name){
    if(e.key==='Enter'){
        let p = players.find(pl=>pl.name===name);
        p.comments.push(e.target.value);
        e.target.value='';
        renderTeam();
    }
}

// PLAYER MODAL
function openPlayer(name){
    let player = players.find(p=>p.name===name);
    let pos = player.pos.includes("Defender")?"Defender":player.pos.includes("Midfield")?"Midfield":"Attack";
    let t = totalStatsByPosition(name,pos);
    let ai = calcAI(t,pos);
    modal.style.display="block";
    let html=`<h2>${name}</h2>`;
    html+=`<p>Matches: ${t.m}</p><p>Goals: ${t.g}</p><p>Assists: ${t.a}</p>`;
    if(pos=="Defender") html+=`<p>Clean Sheet: ${t.cs}</p>`;
    html+=`<p>Pass: ${t.p}%</p>`;
    if(pos=="Attack") html+=`<p>Shot: ${t.s}%</p>`;
    html+=`<p>Best: ${t.best}</p><p>Win: ${t.w}%</p>`;
    html+=`<h1>AI ${ai}</h1>`;
    modalContent.innerHTML=html;
}
modal.onclick=e=>{if(e.target.id==="modal") modal.style.display="none";};

// ADMIN
function login(){
    if(user.value==="TAWHID" && pass.value==="2"){
        panel.style.display="block";
        alert("تم تسجيل الدخول");
    } else alert("بيانات خاطئة");
}
function addPlayer(){
    players.push({name:pname.value,photo:pphoto.value,pos:ppos.value,likes:0,comments:[]});
    renderTeam();
    pname.value="";pphoto.value="";ppos.value="";
    alert("تمت إضافة اللاعب");
}

// RANKING
function renderRanking(){
    players.forEach(p=>{
        let pos = p.pos.includes("Defender")?"Defender":p.pos.includes("Midfield")?"Midfield":"Attack";
        p.ai = calcAI(totalStatsByPosition(p.name,pos), pos);
    });
    let sorted = [...players].sort((a,b)=>b.ai - a.ai);
    rankingBox.innerHTML="";
    sorted.forEach((p,index)=>{
        let className="", icon="";
        if(index===0){className="rankingGold"; icon="🥇";}
        else if(index===1){className="rankingSilver"; icon="🥈";}
        else if(index===2){className="rankingBronze"; icon="🥉";}
        rankingBox.innerHTML+=`
        <div class="card ${className}" style="display:flex; align-items:center; gap:10px;">
            <img src="${p.photo}" style="width:40px; height:40px; border-radius:50%;">
            <div>
                <h3>${icon} ${index+1} - ${p.name}</h3>
                <p>${p.pos}</p>
                <h2>AI ${p.ai}</h2>
            </div>
        </div>`;
    });
}
renderRanking();
</script>

</body>
</html>
