<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAWHID CLUB | V11 ULTIMATE PRESTIGE</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --gold: #ffcf4b;
            --gold-glow: 0 0 25px rgba(255, 207, 75, 0.4);
            --primary: #00d2ff;
            --bg: #000000;
            --card-bg: #0a0a0a;
            --border: rgba(255, 207, 75, 0.2);
        }

        * { box-sizing: border-box; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        body {
            margin: 0; font-family: 'Cairo', sans-serif; background: var(--bg); color: #fff;
            overflow-x: hidden; padding-bottom: 100px;
        }

        /* 1. NEWS TICKER */
        .news-ticker {
            background: rgba(0,0,0,0.9); border-bottom: 1px solid var(--gold);
            padding: 8px 0; overflow: hidden; white-space: nowrap;
            position: fixed; top: 0; width: 100%; z-index: 5000; backdrop-filter: blur(10px);
        }
        .ticker-content { display: inline-block; animation: ticker 40s linear infinite; font-family: 'Orbitron'; color: var(--gold); font-size: 11px; font-weight: 900; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        header { padding: 120px 20px 40px; text-align: center; }
        .logo { width: 120px; filter: drop-shadow(var(--gold-glow)); animation: float 4s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        .club-title { font-family: 'Orbitron'; font-size: 3rem; font-weight: 900; background: linear-gradient(to bottom, #fff, var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 8px; margin: 10px 0; }

        /* NAVIGATION */
        nav { 
            display: flex; justify-content: center; gap: 8px; padding: 15px; 
            position: sticky; top: 38px; z-index: 4000; backdrop-filter: blur(20px); 
            background: rgba(0,0,0,0.8); border-bottom: 1px solid var(--border); overflow-x: auto;
        }
        nav button { background: transparent; border: none; color: #666; padding: 10px 15px; font-weight: 700; cursor: pointer; white-space: nowrap; font-size: 12px; font-family: 'Orbitron', 'Cairo'; }
        nav button.active { color: var(--gold); border-bottom: 2px solid var(--gold); text-shadow: var(--gold-glow); }

        .container { max-width: 1100px; margin: auto; padding: 20px; }
        .section { display: none; animation: fadeIn 0.8s ease; }
        .active-section { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* BADGE SYSTEM */
        .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 900; margin-left: 5px; vertical-align: middle; }
        .badge-scorer { background: #e74c3c; color: white; } /* الهداف */
        .badge-maestro { background: var(--primary); color: #000; } /* صانع اللعب */
        .badge-wall { background: #2ecc71; color: #000; } /* الجدار */
        .badge-legend { background: var(--gold); color: #000; box-shadow: var(--gold-glow); }

        /* TACTICAL PITCH */
        .pitch-container {
            width: 100%; max-width: 550px; height: 750px; margin: 20px auto;
            background: #050505; border: 2px solid #222; border-radius: 20px;
            position: relative; overflow: hidden; box-shadow: inset 0 0 50px rgba(0,210,255,0.1);
        }
        .pitch-line { position: absolute; border: 1px solid rgba(255,255,255,0.05); }
        .half-line { top: 50%; width: 100%; height: 1px; }
        .center-circle { top: 50%; left: 50%; width: 100px; height: 100px; border-radius: 50%; transform: translate(-50%, -50%); }

        .player-node { position: absolute; width: 80px; text-align: center; transform: translate(-50%, -50%); z-index: 10; }
        .player-node .avatar { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--gold); padding: 2px; background: #000; box-shadow: var(--gold-glow); }
        .player-node img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .player-node b { display: block; font-size: 10px; color: var(--gold); margin-top: 5px; background: rgba(0,0,0,0.8); border-radius: 4px; }

        /* RECORDS GRID */
        .records-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; margin-top: 20px; }
        .record-card { background: var(--card-bg); border-right: 4px solid var(--gold); padding: 15px; border-radius: 10px; border: 1px solid #111; border-right: 4px solid var(--gold); }
        .record-card small { color: #555; display: block; font-size: 11px; }
        .record-card span { font-family: 'Orbitron'; color: var(--gold); font-weight: 900; font-size: 16px; }

        /* STATS TABLE */
        .stats-card { background: var(--card-bg); border-radius: 15px; padding: 20px; margin-bottom: 30px; border: 1px solid #111; }
        .luxury-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .luxury-table th { color: var(--gold); padding: 12px; font-size: 11px; border-bottom: 1px solid #222; }
        .luxury-table td { padding: 12px; text-align: center; border-bottom: 1px solid #050505; font-family: 'Orbitron'; font-size: 13px; }

        /* VS MODE */
        .vs-grid { display: grid; grid-template-columns: 1fr auto 1fr; gap: 20px; align-items: center; }
        .vs-box { background: #080808; padding: 20px; border-radius: 15px; border: 1px solid #151515; text-align: center; }
        .vs-select { background: #000; color: var(--gold); border: 1px solid var(--gold); padding: 8px; width: 100%; border-radius: 5px; font-family: 'Orbitron'; margin-bottom: 15px; }

        /* SPONSORS */
        .sponsor-bar {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 80%; max-width: 400px; background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px); border-radius: 50px; padding: 15px;
            display: flex; justify-content: space-evenly; border: 1px solid #222; z-index: 5000;
        }
        .sponsor-bar img { height: 25px; filter: grayscale(1) brightness(3); opacity: 0.6; }

    </style>
</head>
<body>

    <!-- شريط الأخبار -->
    <div class="news-ticker">
        <div class="ticker-content" id="tickerText">
            ✦ جاري تحميل آخر أخبار النادي... ✦ مسيرة V11 مستمرة ✦ TAWHID FC: THE ROYAL LEGACY ✦
        </div>
    </div>

    <header>
        <img src="logo.png" class="logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1165/1165187.png'">
        <h1 class="club-title">TAWHID CLUB</h1>
        <div style="font-family:'Orbitron'; color:var(--primary); font-size: 14px; letter-spacing: 5px;">V11 PRESTIGE EDITION</div>
    </header>

    <nav>
        <button onclick="showSec('home', this)" class="active">الرئيسية</button>
        <button onclick="showSec('pitch', this)">التشكيلة</button>
        <button onclick="showSec('stats', this)">الإحصائيات</button>
        <button onclick="showSec('vs', this)">المقارنة VS</button>
        <button onclick="showSec('awards', this)">الجوائز</button>
        <button onclick="showSec('trophies', this)">البطولات</button>
    </nav>

    <div class="container">
        
        <!-- HOME & RECORDS -->
        <section id="home" class="section active-section">
            <div class="stats-card" style="border-color: var(--primary);">
                <h2 style="font-family: Orbitron; color: var(--primary);">AI STAR ANALYSIS</h2>
                <div id="aiText">المحلل الذكي يراجع البيانات...</div>
            </div>

            <h3 style="font-family: Orbitron; color: var(--gold);"><i class="fas fa-microchip"></i> CLUB RECORDS (V11)</h3>
            <div class="records-grid" id="recordsGrid">
                <!-- تعبئة تلقائية -->
            </div>
        </section>

        <!-- TACTICAL PITCH -->
        <section id="pitch" class="section">
            <div class="pitch-container">
                <div class="pitch-line half-line"></div>
                <div class="pitch-line center-circle"></div>
                <div id="tacticalSpots"></div>
            </div>
        </section>

        <!-- FULL STATS -->
        <section id="stats" class="section">
            <div id="fullStatsContainer"></div>
        </section>

        <!-- VS MODE -->
        <section id="vs" class="section">
            <div class="vs-grid">
                <div class="vs-box">
                    <select id="v1" class="vs-select" onchange="comparePlayers()"></select>
                    <div id="v1Result"></div>
                </div>
                <div style="font-family: Orbitron; font-size: 30px; color: var(--gold);">VS</div>
                <div class="vs-box">
                    <select id="v2" class="vs-select" onchange="comparePlayers()"></select>
                    <div id="v2Result"></div>
                </div>
            </div>
        </section>

        <!-- AWARDS -->
        <section id="awards" class="section">
            <div id="awardsGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px;"></div>
            
            <h2 style="text-align:center; font-family:Orbitron; margin-top: 40px; color:var(--primary)">🎬 GOAL OF THE MONTH</h2>
            <div class="stats-card" style="padding: 10px; border-color: var(--gold);">
                <video controls style="width:100%; border-radius: 10px; display:block;">
                    <source src="https://raw.githubusercontent.com/H7modi77/TAWHID-FC/main/19c9ebcbc1934-master_playlist.mov" type="video/mp4">
                </video>
            </div>
        </section>

        <!-- TROPHIES -->
        <section id="trophies" class="section">
            <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px;">
                <div class="vs-box"><i class="fas fa-trophy" style="font-size: 40px; color: var(--gold);"></i><h3>الدوري الممتاز</h3><p>النسخة 9</p></div>
                <div class="vs-box"><i class="fas fa-crown" style="font-size: 40px; color: var(--gold);"></i><h3>كأس النادي</h3><p>النسخة 10</p></div>
            </div>
        </section>

    </div>

    <!-- SPONSORS -->
    <div class="sponsor-bar">
        <img src="https://upload.wikimedia.org/wikipedia/en/thumb/4/43/EA_Sports_FC_logo.svg/1200px-EA_Sports_FC_logo.svg.png">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/ad/Adidas_Logo.svg/1200px-Adidas_Logo.svg.png">
    </div>

    <script>
        const players = [
            {name:"Almousa3M", pos:"ST", photo:"almousa3m.png", t:"15%", l:"35%"},
            {name:"H2ssain_28", pos:"ST", photo:"h2ssain28.png", t:"15%", l:"65%"},
            {name:"H7modi77", pos:"LW", photo:"h7modi77.png", t:"35%", l:"20%"},
            {name:"Yo0ousef25", pos:"RW", photo:"yo0ousef25.png", t:"35%", l:"80%"},
            {name:"M---_11_11", pos:"CM", photo:"m1111.png", t:"60%", l:"50%"},
            {name:"Basabeso2", pos:"CB", photo:"basabeso2.png", t:"85%", l:"50%"}
        ];

        const statsData = {
            Almousa3M: { October:{m:58,g:65,a:61,p:78,w:60}, November:{m:57,g:67,a:72,p:77,w:53}, January:{m:126,g:161,a:146,p:77,w:49}, February:{m:42,g:48,a:41,p:77,w:49} },
            H2ssain_28: { October:{m:44,g:36,a:15,p:76,w:56}, November:{m:64,g:59,a:48,p:77,w:51}, January:{m:146,g:144,a:72,p:73,w:44}, February:{m:31,g:31,a:55,p:73,w:44} },
            H7modi77: { October:{m:45,g:14,a:36,p:79,w:62}, November:{m:77,g:52,a:54,p:76,w:51}, January:{m:116,g:44,a:85,p:75,w:47}, February:{m:44,g:20,a:26,p:75,w:47} },
            "M---_11_11": { October:{m:68,g:38,a:43,p:81,w:57,cs:2}, November:{m:86,g:48,a:58,p:74,w:54,cs:3}, January:{m:158,g:112,a:113,p:75,w:46,cs:5}, February:{m:40,g:24,a:19,p:75,w:46,cs:2} },
            Yo0ousef25: { October:{m:28,g:23,a:5,p:78,w:67}, November:{m:26,g:21,a:8,p:78,w:58}, January:{m:99,g:57,a:17,p:74,w:43}, February:{m:18,g:11,a:2,p:74,w:43} },
            Basabeso2: { February:{m:24,g:2,a:3,p:85,w:50,cs:4} }
        };

        function calculateRating(d, pos) {
            if(!d || d.m === 0) return 0;
            let rate = ((d.g*1.8 + d.a*1.5 + d.p/10) / d.m) * 6 + 40;
            if(pos === "CB") rate += (d.cs || 0) * 3;
            return Math.min(99, rate).toFixed(1);
        }

        function showSec(id, btn) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active-section'));
            document.getElementById(id).classList.add('active-section');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function init() {
            const tactical = document.getElementById('tacticalSpots');
            const statsContainer = document.getElementById('fullStatsContainer');
            const v1 = document.getElementById('v1');
            const v2 = document.getElementById('v2');
            const awardsGrid = document.getElementById('awardsGrid');
            const recordsGrid = document.getElementById('recordsGrid');

            let globalG = 0, globalA = 0, bestMonthRate = 0, bestMonthPlayer = "";

            players.forEach(p => {
                // Pitch
                tactical.innerHTML += `<div class="player-node" style="top:${p.t}; left:${p.l}"><div class="avatar"><img src="${p.photo}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2102/2102633.png'"></div><b>${p.name}</b></div>`;
                
                // Aggregates for Badges & Records
                let totalM = 0, totalG = 0, totalA = 0, totalCS = 0;
                for(let m in statsData[p.name]) {
                    let d = statsData[p.name][m];
                    totalM += d.m; totalG += d.g; totalA += d.a; totalCS += (d.cs || 0);
                    let mRate = calculateRating(d, p.pos);
                    if(mRate > bestMonthRate) { bestMonthRate = mRate; bestMonthPlayer = p.name; }
                }
                globalG += totalG; globalA += totalA;

                // Badges Logic
                let badges = "";
                if(totalG > 100) badges += `<span class="badge badge-scorer">SCORER</span>`;
                if(totalA > 100) badges += `<span class="badge badge-maestro">MAESTRO</span>`;
                if(totalCS >= 4) badges += `<span class="badge badge-wall">WALL</span>`;
                if(calculateRating({g:totalG, a:totalA, m:totalM, p:75}, p.pos) > 85) badges += `<span class="badge badge-legend">LEGEND</span>`;

                // Stats Tables
                let tableHtml = `<div class="stats-card"><h3>${p.name} ${badges}</h3><table class="luxury-table"><thead><tr><th>الشهر</th><th>M</th><th>G</th><th>A</th><th>P%</th><th>Rating</th></tr></thead><tbody>`;
                for(let m in statsData[p.name]) {
                    let d = statsData[p.name][m];
                    tableHtml += `<tr><td>${m}</td><td>${d.m}</td><td>${d.g}</td><td>${d.a}</td><td>${d.p}%</td><td style="color:var(--gold)">${calculateRating(d, p.pos)}</td></tr>`;
                }
                statsContainer.innerHTML += tableHtml + `</tbody></table></div>`;

                // VS Selects
                v1.innerHTML += `<option value="${p.name}">${p.name}</option>`;
                v2.innerHTML += `<option value="${p.name}">${p.name}</option>`;
            });

            // Fill Records
            recordsGrid.innerHTML = `
                <div class="record-card"><small>أكثر من سجل (V11)</small><span>Almousa3M (441 G)</span></div>
                <div class="record-card"><small>أكثر من صنع (V11)</small><span>Almousa3M (320 A)</span></div>
                <div class="record-card"><small>أعلى تقييم شهري</small><span>${bestMonthPlayer} (${bestMonthRate})</span></div>
                <div class="record-card"><small>إجمالي أهداف النادي</small><span>${globalG} GOALS</span></div>
            `;

            // Ticker Update
            document.getElementById('tickerText').innerText = `✦ BREAKING: Almousa3M سجل ${globalG} هدفاً في V11 ✦ الأسطورة M---_11_11 يحقق أعلى تقييم في يناير ✦ نظام الأوسمة الجديد مفعل الآن ✦ `;

            // Awards Render
            const aw = [{m:"OCTOBER", n:"M---_11_11", i:"fa-crown"}, {m:"NOVEMBER", n:"H2ssain_28", i:"fa-medal"}, {m:"JANUARY", n:"Almousa3M", i:"fa-fire"}, {m:"FEBRUARY", n:"Almousa3M", i:"fa-star"}];
            aw.forEach(a => awardsGrid.innerHTML += `<div class="vs-box"><i class="fas ${a.i}" style="font-size:30px; color:var(--gold); margin-bottom:10px;"></i><small>${a.m}</small><h3>لاعب الشهر</h3><p style="color:var(--gold); font-family:Orbitron;">${a.n}</p></div>`);

            v2.selectedIndex = 1;
            comparePlayers();
        }

        function comparePlayers() {
            const p1 = document.getElementById('v1').value;
            const p2 = document.getElementById('v2').value;
            [p1, p2].forEach((n, i) => {
                let tg=0, ta=0, tm=0;
                for(let m in statsData[n]) { tg += statsData[n][m].g; ta += statsData[n][m].a; tm += statsData[n][m].m; }
                document.getElementById(`v${i+1}Result`).innerHTML = `<div style="font-size:35px; color:var(--gold); font-family:Orbitron;">${calculateRating({g:tg, a:ta, m:tm, p:75}, 'ST')}</div><p>G: ${tg} | A: ${ta}</p>`;
            });
        }

        window.onload = init;
    </script>
</body>
</html>
