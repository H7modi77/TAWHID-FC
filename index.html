<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAWHID CLUB</title>
<style>
body{margin:0;font-family:sans-serif;background:#0b0f1a;color:white;text-align:center;padding-bottom:70px;}
body::before{content:"";position:fixed;width:200%;height:200%;background:linear-gradient(45deg,#001,#112,#001);animation:bg 20s linear infinite;z-index:-1;}
@keyframes bg{100%{transform:translate(-50%,-50%)}} 
.hero{padding:40px;background:linear-gradient(90deg,#0ea5ff,#7c3aed);}
.logo{width:80px;}
nav{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;padding:10px;}
nav button{background:#ffffff22;border:none;color:white;padding:10px;border-radius:10px;cursor:pointer;}
.section{display:none;padding:15px;}
.active{display:block;}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.card{background:#ffffff11;backdrop-filter:blur(12px);border-radius:15px;padding:10px;cursor:pointer;}
.card img{width:100%;border-radius:12px;}
.modal{display:none;position:fixed;top:0;width:100%;height:100%;background:#000a;justify-content:center;align-items:center;}
.modalBox{background:#111;margin:0 auto;width:80%;max-width:700px;padding:20px;border-radius:15px;}
table{width:100%;border-collapse:collapse;margin-top:10px;}
td,th{border:1px solid #ffffff22;padding:6px;font-size:12px;}
.sponsors{position:fixed;bottom:0;width:100%;background:#000c;display:flex;justify-content:center;gap:20px;padding:8px;}
.sponsors img{height:40px;}
video{width:100%;border-radius:10px;cursor:pointer;}
.newsCard img{width:100%;border-radius:10px;}
.newsDate{font-size:12px;opacity:.7;}
.rankingGold{border:2px solid #FFD700;}
.rankingSilver{border:2px solid #C0C0C0;}
.rankingBronze{border:2px solid #CD7F32;}
#videoModal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#000c;justify-content:center;align-items:center;z-index:9999;}
#videoModal video{width:90%;max-width:900px;border-radius:10px;}
#videoModal button{position:absolute;top:20px;right:20px;background:#fff;border:none;padding:8px 12px;border-radius:5px;cursor:pointer;}
</style>
</head>
<body>

<header class="hero">
    <img src="logo.png" class="logo">
    <h1>TAWHID CLUB</h1>
    <p>Ultimate Team System</p>
</header>

<nav>
    <button onclick="show('home')">الرئيسية</button>
    <button onclick="show('team')">اللاعبين</button>
    <button onclick="show('awards')">الجوائز</button>
    <button onclick="show('stats')">الإحصائيات</button>
    <button onclick="show('ranking')">الترتيب</button>
    <button onclick="show('admin')">Admin</button>
</nav>

<section id="home" class="section active">
    <h2>آخر الأخبار</h2>
    <div id="newsBox" class="grid"></div>
</section>

<section id="team" class="section">
    <h2>الفريق</h2>
    <div id="playersContainer" class="grid"></div>
</section>

<section id="awards" class="section">
    <h2>جوائز الشهر</h2>
    <div id="awardsBox" class="grid"></div>
</section>

<section id="stats" class="section">
    <h2>إحصائيات اللاعبين</h2>
    <div id="statsBox"></div>
</section>

<section id="ranking" class="section">
    <h2>ترتيب اللاعبين</h2>
    <div id="rankingBox" class="grid"></div>
</section>

<section id="admin" class="section">
    <input id="user" placeholder="User">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <div id="panel" style="display:none">
        <input id="pname" placeholder="اسم اللاعب">
        <input id="pphoto" placeholder="الصورة">
        <input id="ppos" placeholder="المركز">
        <button onclick="addPlayer()">إضافة لاعب</button>
    </div>
</section>

<div id="modal" class="modal">
    <div id="modalContent" class="modalBox"></div>
</div>

<div id="videoModal">
    <video controls></video>
    <button onclick="closeVideo()">إغلاق</button>
</div>

<footer class="sponsors">
    <img src="sponsor1.png">
    <img src="sponsor2.png">
</footer>

<script>
document.addEventListener("DOMContentLoaded", function() {
    // SPA
    function show(id){
        document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
        document.getElementById(id).classList.add("active");
    }
    window.show = show;

    // بيانات اللاعبين
    let players=[
        {name:"Basabeso2",photo:"basabeso2.png",pos:"Defender"},
        {name:"M---_11_11",photo:"m1111.png",pos:"Midfield"},
        {name:"H7modi77",photo:"h7modi77.png",pos:"Midfield/Attack"},
        {name:"Almousa3M",photo:"almousa3m.png",pos:"Attack"},
        {name:"H2ssain_28",photo:"h2ssain28.png",pos:"Attack"},
        {name:"Yo0ousef25",photo:"yo0ousef25.png",pos:"Attack"}
    ];

    const stats={
        Basabeso2:{February:{m:24,g:2,a:3,cs:4,p:85,best:3,w:50}},
        "M---_11_11":{October:{m:68,g:38,a:43,p:81,best:9,w:57},November:{m:86,g:48,a:58,p:74,best:10,w:54},January:{m:158,g:112,a:113,p:75,best:11,w:46},February:{m:40,g:24,a:19,p:75,best:8,w:46}},
        H7modi77:{October:{m:45,g:14,a:36,p:79,s:37,best:2,w:62},November:{m:77,g:52,a:54,p:76,s:40,best:9,w:51},January:{m:116,g:44,a:85,p:75,s:39,best:19,w:47},February:{m:44,g:20,a:26,p:75,s:37,best:9,w:47}},
        Almousa3M:{October:{m:58,g:65,a:61,p:78,s:33,best:18,w:60},November:{m:57,g:67,a:72,p:77,s:33,best:15,w:53},January:{m:126,g:161,a:146,p:77,s:40,best:24,w:49},February:{m:42,g:48,a:41,p:77,s:39,best:9,w:49}},
        H2ssain_28:{October:{m:44,g:36,a:15,p:76,s:23,best:1,w:56},November:{m:64,g:59,a:48,p:77,s:25,best:8,w:51},January:{m:146,g:144,a:72,p:73,s:28,best:9,w:44},February:{m:31,g:31,a:55,p:73,s:28,best:1,w:44}},
        Yo0ousef25:{October:{m:28,g:23,a:5,p:78,s:46,best:0,w:67},November:{m:26,g:21,a:8,p:78,s:52,best:3,w:58},January:{m:99,g:57,a:17,p:74,s:47,best:0,w:43},February:{m:18,g:11,a:2,p:74,s:47,best:1,w:43}}
    };

    function calcAI(d,pos){
        let ai=(d.g*2.1)+(d.a*2.1)+(d.p*1.5)+(d.w*1.5);
        if(pos=="Attack") ai+=d.s*2.5;
        if(pos=="Defender") ai+= (d.cs||0)*2.0;
        return Math.round(ai);
    }

    function totalStatsByPosition(name,pos){
    let months=stats[name];
    let t={m:0,g:0,a:0,p:0,s:0,w:0,cs:0,best:0};
    let c=0;
    for(let m in months){
        let d=months[m];
        t.m+=d.m; t.g+=d.g; t.a+=d.a; t.p+=d.p; t.s+=d.s||0; t.w+=d.w; t.cs+=d.cs||0;
        t.best += d.best || 0; // جمع بدل المتوسط
        c++;
    }
    t.p = Math.round(t.p/c); // Pass يبقى معدل
    t.s = Math.round(t.s/c); // Shot يبقى معدل
    t.w = Math.round(t.w/c); // Win يبقى معدل
    t.cs = Math.round(t.cs/c); // CS يبقى معدل
    // t.best لا نقسمه، يبقى مجموع
    return t;
}

    function renderTeam(){
        const container = document.getElementById("playersContainer");
        container.innerHTML="";
        players.forEach(p=>{
            let pos = p.pos.includes("Defender")?"Defender":p.pos.includes("Midfield")?"Midfield":"Attack";
            let ai = calcAI(totalStatsByPosition(p.name,pos),pos);
            container.innerHTML+=`<div class="card" onclick="openPlayer('${p.name}')">
                <img src="${p.photo}">
                <h3>${p.name}</h3>
                <p>${p.pos}</p>
                <h2>AI ${ai}</h2>
            </div>`;
        });
    }

    renderTeam();

    // PLAYER MODAL
    window.openPlayer = function(name){
        let player = players.find(p=>p.name===name);
        let pos = player.pos.includes("Defender")?"Defender":player.pos.includes("Midfield")?"Midfield":"Attack";
        let t = totalStatsByPosition(name,pos);
        let ai = calcAI(t,pos);
        const modal = document.getElementById("modal");
        modal.style.display="flex";
        document.getElementById("modalContent").innerHTML=`<h2>${name}</h2>
            <p>Matches: ${t.m}</p><p>Goals: ${t.g}</p><p>Assists: ${t.a}</p>`+
            (pos=="Defender"?`<p>Clean Sheet: ${t.cs}</p>`:"")+
            `<p>Pass: ${t.p}%</p>`+
            (pos=="Attack"?`<p>Shot: ${t.s}%</p>`:"")+
            `<p>Best: ${t.best}</p><p>Win: ${t.w}%</p><h1>AI ${ai}</h1>`;
    }

    document.getElementById("modal").onclick = e=>{
        if(e.target.id==="modal") e.target.style.display="none";
    }

    // الأخبار
    const news=[
        {title:"اجتماع لأعضاء النادي حول قضية عدم اللعب بسبب غياب لاعب",img:"news1.png",date:"2026-02-25"},
        {title:"مقابلة اللاعب yo0ousef25 مع قناة skysports",img:"news2.png",date:"2026-02-27"}
    ];
    const newsBox = document.getElementById("newsBox");
    news.forEach(n=>{
        newsBox.innerHTML+=`<div class="card newsCard">
            <img src="${n.img}">
            <h3>${n.title}</h3>
            <p class="newsDate">${n.date}</p>
        </div>`;
    });

    // جوائز
    let awards={player:{name:"Almousa3M",img:"award-player.png",month:"Feb"},goal:{player:"H7modi77",img:"award-goal.png",video:"https://raw.githubusercontent.com/H7modi77/TAWHID-FC/main/19c9ebcbc1934-master_playlist.mov"}};
    const awardsBox = document.getElementById("awardsBox");
    awardsBox.innerHTML = `<div class="card">
        <h3> لاعب الشهر</h3>
        <img src="${awards.player.img}">
        <h2>${awards.player.name}</h2>
        <p>${awards.player.month}</p>
    </div>
    <div class="card">
        <h3> هدف الشهر</h3>
        <img src="${awards.goal.img}">
        <p>${awards.goal.player}</p>
        <video controls onclick="playVideoFull(this.src)"><source src="${awards.goal.video}"></video>
    </div>`;

    window.playVideoFull = function(src){
        const vmodal = document.getElementById("videoModal");
        vmodal.style.display="flex";
        vmodal.querySelector("video").src=src;
        vmodal.querySelector("video").play();
    }

    window.closeVideo = function(){
        const vmodal = document.getElementById("videoModal");
        vmodal.querySelector("video").pause();
        vmodal.style.display="none";
    }

    // STATS
    function renderStats(){
        const statsBox = document.getElementById("statsBox");
        statsBox.innerHTML = "";
        players.forEach(player=>{
            let name = player.name;
            let pos = player.pos.includes("Defender")?"Defender":player.pos.includes("Midfield")?"Midfield":"Attack";
            let months=stats[name]; 
            let html=`<div class="card"><h3>${name} (${pos})</h3><table><tr><th>Month</th>`;
            if(pos=="Defender") html+=`<th>M</th><th>G</th><th>A</th><th>CS</th><th>P%</th><th>Best</th><th>W%</th><th>Final AI</th></tr>`;
            else if(pos=="Midfield") html+=`<th>M</th><th>G</th><th>A</th><th>P%</th><th>Best</th><th>W%</th><th>Final AI</th></tr>`;
            else html+=`<th>M</th><th>G</th><th>A</th><th>P%</th><th>S%</th><th>Best</th><th>W%</th><th>Final AI</th></tr>`;
            for(let m in months){
                let d=months[m];
                let ai = calcAI(d,pos);
                if(pos=="Defender") html+=`<tr><td>${m}</td><td>${d.m}</td><td>${d.g}</td><td>${d.a}</td><td>${d.cs||0}</td><td>${d.p}</td><td>${d.best||0}</td><td>${d.w}</td><td>${ai}</td></tr>`;
                else if(pos=="Midfield") html+=`<tr><td>${m}</td><td>${d.m}</td><td>${d.g}</td><td>${d.a}</td><td>${d.p}</td><td>${d.best||0}</td><td>${d.w}</td><td>${ai}</td></tr>`;
                else html+=`<tr><td>${m}</td><td>${d.m}</td><td>${d.g}</td><td>${d.a}</td><td>${d.p}</td><td>${d.s||0}</td><td>${d.best||0}</td><td>${d.w}</td><td>${ai}</td></tr>`;
            }
            let t=totalStatsByPosition(name,pos);
            let totalAI = calcAI(t,pos);
            if(pos=="Defender") html+=`<tr><th>Total</th><th>${t.m}</th><th>${t.g}</th><th>${t.a}</th><th>${t.cs}</th><th>${t.p}</th><th>${t.best}</th><th>${t.w}</th><th>${totalAI}</th></tr>`;
            else if(pos=="Midfield") html+=`<tr><th>Total</th><th>${t.m}</th><th>${t.g}</th><th>${t.a}</th><th>${t.p}</th><th>${t.best}</th><th>${t.w}</th><th>${totalAI}</th></tr>`;
            else html+=`<tr><th>Total</th><th>${t.m}</th><th>${t.g}</th><th>${t.a}</th><th>${t.p}</th><th>${t.s}</th><th>${t.best}</th><th>${t.w}</th><th>${totalAI}</th></tr>`;
            html+=`</table></div>`;
            statsBox.innerHTML+=html;
        });
    }
    renderStats();

    // Leaderboard
    function renderRanking(){
        const rankingBox = document.getElementById("rankingBox");
        rankingBox.innerHTML="";
        let rankingData = players.map(p=>{
            let pos = p.pos.includes("Defender")?"Defender":p.pos.includes("Midfield")?"Midfield":"Attack";
            let t = totalStatsByPosition(p.name,pos);
            let ai = calcAI(t,pos);
            return {...p, ai:ai};
        });
        rankingData.sort((a,b)=>b.ai - a.ai);
        rankingData.forEach((p,index)=>{
            let className="", icon="";
            if(index===0){className="rankingGold"; icon="🥇";}
            else if(index===1){className="rankingSilver"; icon="🥈";}
            else if(index===2){className="rankingBronze"; icon="🥉";}
            rankingBox.innerHTML += `<div class="card ${className}">
                <h3>${icon} ${index+1} - ${p.name}</h3>
                <p>${p.pos}</p>
                <h2>AI ${p.ai}</h2>
            </div>`;
        });
    }
    renderRanking();
});
</script>
</body>
</html>
