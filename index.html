<script>

const supabaseUrl = "https://pgpjdwltezrxmpnuqvem.supabase.co";
const supabaseKey = "PUT_YOUR_ANON_KEY_HERE";

const supabase = supabase.createClient(supabaseUrl, supabaseKey);


/* ================= LEGACY (ثابت كما هو) ================= */
const legacyPlayers = [
    {n: "yo0ousef25", g: 434, a: 171, r: 6.9},
    {n: "M-_-_-_-11_11", g: 635, a: 728, r: 7.3},
    {n: "Alaly19", g: 507, a: 263, r: 7.5},
    {n: "H7modi_77", g: 446, a: 885, r: 7.7},
    {n: "h2ssain", g: 842, a: 507, r: 8.1},

/* ================= LOAD PLAYERS ================= */
async function loadPlayers() {
    const { data } = await supabase.from("players").select("*");

    const squadCont = document.getElementById("active-squad-container");
    const pitch = document.getElementById("pitch-map");

    squadCont.innerHTML = "";
    pitch.innerHTML = "";

    if(!data) return;

    data.forEach(p => {

        squadCont.innerHTML += `
        <div class="card">
            <div class="player-row">
                <img src="${p.image}" class="player-img" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2102/2102633.png'">
                <div>
                    <b style="font-size:16px;">${p.name}</b>
                    <div style="font-size:10px; color:var(--accent);">POS: ${p.position}</div>
                </div>
            </div>
        </div>`;

        pitch.innerHTML += `
        <div class="p-node" style="top:${p.t}; left:${p.l}">
            <img src="${p.image}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2102/2102633.png'">
            <b>${p.name}</b>
        </div>`;
    });
}


/* ================= LOAD NEWS ================= */
async function loadNews(cat = "all") {

    let query = supabase.from("news").select("*");

    if(cat !== "all") query = query.eq("category", cat);

    const { data } = await query;

    const list = document.getElementById("news-list");
    list.innerHTML = "";

    if(!data) return;

    data.forEach(n => {
        list.innerHTML += `
        <div class="card">
            <small style="color:var(--accent)">${n.date}</small>
            <h4>${n.title}</h4>
            <p style="font-size:12px; opacity:0.8;">${n.content}</p>
        </div>`;
    });
}


/* ================= LOAD AWARDS ================= */
async function loadAwards() {
    const { data } = await supabase.from("awards").select("*");
    if(!data) return;

    let potm = data.find(x => x.type === "POTM");
    let goal = data.find(x => x.type === "GOAL");

    if(potm) {
        document.querySelector(".player-img").src = potm.image || document.querySelector(".player-img").src;
        document.querySelector(".card h4")?.nextElementSibling;
    }

    if(goal) {
        const video = document.querySelector("video source");
        if(video) video.src = goal.video_url;
    }
}


/* ================= YOUR ORIGINAL FUNCTIONS (بدون تغيير تصميم) ================= */

let chartObj = null;

function navTo(id, btn) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active-section'));
    document.getElementById(id).classList.add('active-section');

    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    const backBtn = document.getElementById('globalBack');
    if(id === 'about') backBtn.classList.remove('visible');
    else backBtn.classList.add('visible');

    window.scrollTo(0,0);
}

function goHome() {
    navTo('about', document.getElementById('btn-about'));
}

function toggleTheme() {
    document.body.classList.toggle('light-mode');
    const isLight = document.body.classList.contains('light-mode');
    document.getElementById('themeIcon').className = isLight ? 'fas fa-sun' : 'fas fa-moon';
}

function filterNews(cat, btn) {
    if(btn){
        document.querySelectorAll('.news-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }
    loadNews(cat);
}


/* ================= INIT ================= */
window.onload = async function () {

    // legacy (ثابت)
    const legCont = document.getElementById('legacy-stats-container');
    legacyPlayers.forEach(p => {
        legCont.innerHTML += `<div class="card" style="padding:10px; font-size:11px;"><b style="color:var(--gold);">${p.n.toUpperCase()}</b> | G: ${p.g} | A: ${p.a} | R: ${p.r}</div>`;
    });

    await loadPlayers();
    await loadNews();
    await loadAwards();
};
</script>
