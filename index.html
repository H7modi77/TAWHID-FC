<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TAWHID FC | ELITE HUB V13</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Supabase Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --bg: #05050a;
            --card: #0f0f1a;
            --text: #ffffff;
            --accent: #4cc9f0;
            --gold: #d4af37;
            --danger: #ff4b2b;
            --border: rgba(255,255,255,0.1);
        }

        .light-mode {
            --bg: #f0f2f5;
            --card: #ffffff;
            --text: #1a1a1a;
            --accent: #4361ee;
            --gold: #b8860b;
            --border: rgba(0,0,0,0.1);
        }

        * { box-sizing: border-box; transition: 0.3s; -webkit-tap-highlight-color: transparent; }
        
        body {
            margin: 0; background: var(--bg); color: var(--text);
            font-family: 'Orbitron', sans-serif; overflow-x: hidden; padding-bottom: 100px;
        }

        .arabic { font-family: 'Cairo', sans-serif; direction: rtl; }

        .top-bar {
            position: sticky; top: 0; width: 100%; background: var(--bg);
            display: flex; align-items: center; justify-content: space-between;
            padding: 15px 20px; z-index: 10000; border-bottom: 1px solid var(--border);
        }
        .back-btn { 
            visibility: hidden; font-size: 18px; color: var(--accent); 
            display: flex; align-items: center; gap: 5px; cursor: pointer;
            font-family: 'Cairo'; font-weight: bold;
        }
        .back-btn.visible { visibility: visible; }

        nav {
            position: fixed; bottom: 20px; left: 5%; width: 90%;
            background: var(--card); border: 1px solid var(--border);
            border-radius: 40px; display: flex; justify-content: space-around;
            padding: 15px; backdrop-filter: blur(20px); z-index: 9000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        nav button { background: none; border: none; color: #666; font-size: 18px; cursor: pointer; }
        nav button.active { color: var(--accent); transform: scale(1.2); }

        .container { padding: 20px; }
        .card { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid var(--border); margin-bottom: 20px; position: relative; }
        .section { display: none; animation: fadeIn 0.4s ease; }
        .active-section { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .player-row { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .player-img { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--accent); object-fit: cover; background: #000; }
        .form-up { color: #00ff88; font-size: 10px; }
        .form-down { color: var(--danger); font-size: 10px; }

        .stat-table { width: 100%; border-collapse: collapse; font-size: 10px; }
        .stat-table th { color: var(--accent); padding: 5px; border-bottom: 1px solid var(--border); }
        .stat-table td { padding: 8px 4px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.02); }

        .ai-box { background: linear-gradient(135deg, rgba(76, 201, 240, 0.05), rgba(212, 175, 55, 0.05)); border: 1px dashed var(--gold); border-radius: 15px; padding: 15px; }
        .synergy-score { font-size: 24px; font-weight: 900; color: var(--accent); text-shadow: 0 0 10px var(--accent); }

        .pitch { height: 450px; background: rgba(76, 201, 240, 0.03); border: 1px solid var(--border); border-radius: 20px; position: relative; overflow: hidden; margin-top: 15px; }
        .p-node { position: absolute; transform: translate(-50%, -50%); text-align: center; }
        .p-node img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--accent); }
        .p-node b { display: block; font-size: 8px; color: var(--text); background: rgba(0,0,0,0.5); border-radius: 3px; }

        /* Admin Forms */
        input, select, textarea { 
            width: 100%; background: #000; border: 1px solid var(--border); 
            color: #fff; padding: 10px; border-radius: 8px; margin-bottom: 10px; 
            font-family: 'Cairo';
        }
        .admin-btn { background: var(--accent); border: none; color: #000; padding: 10px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 20000; flex-direction: column; }
        .modal-header { padding: 20px; display: flex; align-items: center; border-bottom: 1px solid var(--border); }
        .modal-body { padding: 20px; overflow-y: auto; flex-grow: 1; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div id="globalBack" class="back-btn" onclick="goHome()">
            <i class="fas fa-chevron-left"></i> عودة
        </div>
        <div style="text-align: center;">
            <span style="font-weight: 900; letter-spacing: 1px;">TAWHID FC</span>
        </div>
        <div style="display: flex; gap: 15px;">
            <i onclick="openAdmin()" class="fas fa-cog" style="color: var(--accent); cursor: pointer;"></i>
            <i id="themeIcon" onclick="toggleTheme()" class="fas fa-moon" style="color: var(--accent); cursor: pointer;"></i>
        </div>
    </div>

    <div class="container">
        <!-- Dashboard / About -->
        <section id="about" class="section active-section">
            <div class="card">
                <h3 style="margin-top: 0;">CLUB OVERVIEW</h3>
                <div class="ai-box">
                    <div style="color: var(--gold); font-size: 12px; font-weight: bold;"><i class="fas fa-award"></i> TOP LEGENDS</div>
                    <div id="legacy-stats-container">جاري التحميل...</div>
                </div>
            </div>
            <h4 style="color: var(--accent);">LATEST NEWS</h4>
            <div id="news-summary"></div>
        </section>

        <!-- Squad -->
        <section id="squad" class="section">
            <div id="active-squad-container">جاري تحميل الفريق...</div>
            <h4 style="margin-top: 20px; color: var(--accent);">TACTICAL BOARD</h4>
            <div class="pitch" id="pitch-map"></div>
        </section>

        <!-- News -->
        <section id="news" class="section arabic">
            <div id="news-list"></div>
        </section>

        <!-- Admin Login / Control -->
        <section id="admin" class="section">
            <div id="admin-login" class="card">
                <h3>لوحة التحكم</h3>
                <input type="password" id="adminPass" placeholder="كلمة المرور">
                <button class="admin-btn" onclick="checkAdmin()">دخول</button>
            </div>
            <div id="admin-panel" style="display: none;">
                <div class="card">
                    <h4>إضافة لاعب جديد</h4>
                    <input type="text" id="pName" placeholder="اسم اللاعب">
                    <input type="text" id="pPos" placeholder="المركز (ST, CM, CB...)">
                    <input type="text" id="pImg" placeholder="رابط الصورة">
                    <button class="admin-btn" onclick="dbAddPlayer()">حفظ اللاعب</button>
                </div>
                <div class="card">
                    <h4>إضافة إحصائية شهرية</h4>
                    <select id="pSelect"></select>
                    <input type="text" id="sMonth" placeholder="الشهر (مثلاً: Feb)">
                    <input type="number" id="sMatch" placeholder="المباريات">
                    <input type="number" id="sGoal" placeholder="الأهداف">
                    <input type="number" id="sAssist" placeholder="الأسيست">
                    <button class="admin-btn" onclick="dbAddStats()">إضافة الإحصائية</button>
                </div>
                <div class="card">
                    <h4>إضافة خبر</h4>
                    <input type="text" id="nTitle" placeholder="العنوان">
                    <textarea id="nDesc" placeholder="التفاصيل"></textarea>
                    <button class="admin-btn" onclick="dbAddNews()">نشر الخبر</button>
                </div>
                <button class="admin-btn" style="background: var(--danger);" onclick="location.reload()">تسجيل خروج</button>
            </div>
        </section>
    </div>

    <!-- Stats Modal -->
    <div id="statsModal" class="modal">
        <div class="modal-header">
            <div class="back-btn visible" onclick="closeStats()"><i class="fas fa-chevron-left"></i> عودة</div>
            <div id="modalPlayerName" style="flex-grow: 1; text-align: center; font-weight: bold; color: var(--accent);">Analytics</div>
        </div>
        <div class="modal-body">
            <div class="card"><canvas id="playerChart" height="250"></canvas></div>
        </div>
    </div>

    <nav>
        <button id="btn-about" onclick="navTo('about', this)" class="active"><i class="fas fa-home"></i></button>
        <button id="btn-squad" onclick="navTo('squad', this)"><i class="fas fa-users-cog"></i></button>
        <button id="btn-news" onclick="navTo('news', this)"><i class="fas fa-newspaper"></i></button>
        <button id="btn-admin" onclick="navTo('admin', this)"><i class="fas fa-lock"></i></button>
    </nav>

    <script>
        // Supabase Configuration
        const SB_URL = "https://pgpjdwltezrxmpnuqvem.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBncGpkd2x0ZXpyeG1wbnVxdmVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4MzUwMjgsImV4cCI6MjA5MjQxMTAyOH0.KtVZAP-EhFAw1gonKGn4ulXVJp-tjKZVFIMNEfES7ho";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let activeSquad = [];
        let chartObj = null;

        async function loadData() {
            // Load Players
            const { data: players, error: pErr } = await _supabase.from('players').select('*');
            // Load Stats
            const { data: stats, error: sErr } = await _supabase.from('stats').select('*');
            // Load News
            const { data: news, error: nErr } = await _supabase.from('news').select('*').order('created_at', { ascending: false });
            // Load Legacy
            const { data: legacy, error: lErr } = await _supabase.from('legacy_players').select('*');

            if (pErr || sErr) return console.error("Error fetching data");

            // Process Squad Data
            activeSquad = players.map(p => {
                return { ...p, stats: stats.filter(s => s.player_id === p.id) };
            });

            renderSquad();
            renderNews(news);
            renderLegacy(legacy);
            fillAdminSelect(players);
        }

        function renderSquad() {
            const squadCont = document.getElementById('active-squad-container');
            const pitch = document.getElementById('pitch-map');
            squadCont.innerHTML = "";
            pitch.innerHTML = "";

            activeSquad.forEach(p => {
                let totalGoals = p.stats.reduce((acc, curr) => acc + curr.goals, 0);
                let rows = p.stats.map(s => `
                    <tr>
                        <td>${s.month_name}</td>
                        <td>${s.matches}</td>
                        <td>${s.goals}</td>
                        <td>${s.assists}</td>
                        <td>${s.motm}</td>
                        <td>${s.pass_accuracy}%</td>
                    </tr>
                `).join('');

                squadCont.innerHTML += `
                    <div class="card">
                        <div class="player-row">
                            <img src="${p.img_url || 'https://cdn-icons-png.flaticon.com/512/2102/2102633.png'}" class="player-img" onclick="openStats('${p.id}')">
                            <div>
                                <b style="font-size: 16px;">${p.name}</b>
                                <div style="font-size: 10px; color: var(--accent);">POS: ${p.position} | TOTAL G: ${totalGoals}</div>
                            </div>
                        </div>
                        <table class="stat-table">
                            <thead><tr><th>MO</th><th>M</th><th>G</th><th>A</th><th>MOTM</th><th>PASS</th></tr></thead>
                            <tbody>${rows || '<tr><td colspan="6">No stats recorded yet.</td></tr>'}</tbody>
                        </table>
                    </div>`;

                pitch.innerHTML += `<div class="p-node" style="top:${p.pitch_top}; left:${p.pitch_left}"><img src="${p.img_url || 'https://cdn-icons-png.flaticon.com/512/2102/2102633.png'}"><b>${p.name}</b></div>`;
            });
        }

        function renderNews(news) {
            const list = document.getElementById('news-list');
            list.innerHTML = news.map(n => `
                <div class="card">
                    <small style="color: var(--accent);">${new Date(n.created_at).toLocaleDateString('ar-SA')}</small>
                    <h4>${n.title}</h4>
                    <p style="font-size: 12px; opacity:0.8;">${n.description}</p>
                </div>
            `).join('');
        }

        function renderLegacy(legacy) {
            const legCont = document.getElementById('legacy-stats-container');
            legCont.innerHTML = legacy.map(p => `
                <div style="font-size: 11px; margin-bottom:5px;">
                    <b style="color:var(--gold);">${p.name.toUpperCase()}</b> | G: ${p.goals} | A: ${p.assists} | R: ${p.rating}
                </div>
            `).join('');
        }

        // Admin Functions
        function checkAdmin() {
            const pass = document.getElementById('adminPass').value;
            if (pass === '123123') {
                document.getElementById('admin-login').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'block';
            } else {
                alert('كلمة مرور خاطئة!');
            }
        }

        async function dbAddPlayer() {
            const name = document.getElementById('pName').value;
            const pos = document.getElementById('pPos').value;
            const img = document.getElementById('pImg').value;
            await _supabase.from('players').insert([{ name, position: pos, img_url: img }]);
            alert('تمت الإضافة!');
            loadData();
        }

        async function dbAddStats() {
            const pId = document.getElementById('pSelect').value;
            const month = document.getElementById('sMonth').value;
            const m = document.getElementById('sMatch').value;
            const g = document.getElementById('sGoal').value;
            const a = document.getElementById('sAssist').value;
            await _supabase.from('stats').insert([{ player_id: pId, month_name: month, matches: m, goals: g, assists: a }]);
            alert('تم تحديث الإحصائيات!');
            loadData();
        }

        async function dbAddNews() {
            const title = document.getElementById('nTitle').value;
            const desc = document.getElementById('nDesc').value;
            await _supabase.from('news').insert([{ title, description: desc }]);
            alert('تم نشر الخبر!');
            loadData();
        }

        function fillAdminSelect(players) {
            const sel = document.getElementById('pSelect');
            sel.innerHTML = players.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
        }

        // Helper Functions
        function navTo(id, btn) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active-section'));
            document.getElementById(id).classList.add('active-section');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const backBtn = document.getElementById('globalBack');
            id === 'about' ? backBtn.classList.remove('visible') : backBtn.classList.add('visible');
            window.scrollTo(0,0);
        }

        function goHome() { navTo('about', document.getElementById('btn-about')); }

        function openStats(id) {
            const p = activeSquad.find(x => x.id === id);
            if(!p || p.stats.length === 0) return;
            document.getElementById('modalPlayerName').innerText = p.name;
            document.getElementById('statsModal').style.display = 'flex';
            const ctx = document.getElementById('playerChart').getContext('2d');
            if(chartObj) chartObj.destroy();
            chartObj = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: p.stats.map(s => s.month_name),
                    datasets: [
                        { label: 'Goals', data: p.stats.map(s => s.goals), borderColor: '#4cc9f0' },
                        { label: 'Assists', data: p.stats.map(s => s.assists), borderColor: '#d4af37' }
                    ]
                },
                options: { plugins: { legend: { labels: { color: '#888' } } } }
            });
        }

        function closeStats() { document.getElementById('statsModal').style.display = 'none'; }
        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            document.getElementById('themeIcon').className = document.body.classList.contains('light-mode') ? 'fas fa-sun' : 'fas fa-moon';
        }

        window.onload = loadData;
    </script>
</body>
</html>
